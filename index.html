const CKAB_THEOLOGY=[
{id:'reshut',heb:'רשות',hebn:'Reshut',title:'Permission',
rabbinic:"In Hebrew theology, every force in creation operates with divine permission (reshut). The Satan (הַשָּׂטָן) in Job is not God's enemy but His prosecuting attorney — a member of the divine court who tests human beings under divine commission. 'The LORD said unto Satan, Behold, all that he hath is in thy power' (Job 1:12). This is explicit: the adversary's power is *delegated*, *bounded*, and *revocable*. The same principle governs all spiritual entities — angels, planetary intelligences, and the forces catalogued in the grimoire tradition. Nothing operates outside the divine permission structure.",
christian:"Christian demonology after Augustine tends to personalize evil: fallen angels genuinely rebelled and now act against God's will. But Christian *Kabbalah* — Agrippa, Reuchlin, Kircher — actually preserves the permission concept more faithfully than mainstream Christian theology. The Solomonic grimoire tradition depends entirely on reshut: the operator invokes divine Names not to *overpower* a spirit but to *reassert the permission structure* that the spirit already operates within. The Key of Solomon works because the Names remind the spirit of its boundaries, not because they inflict violence upon it. YHShVH (326) is the supreme assertion of reshut: the Name that contains all authority because it contains the full divine identity — Father, Spirit, and Son.",
practical:"This changes how you read every Goetia card. The defense system computes offsets from YHShVH not because Christ *fights* the spirits but because the Pentagrammaton *reminds them of their commission*. When you speak the Name, you are not attacking Bael — you are reasserting the permission structure that Bael already operates within. This is why the grimoire formula is 'I command thee in the Name of...' rather than 'I destroy thee.' You are invoking the chain of authority, not the power of violence. The spirit responds because it recognizes the Name of the one who originally gave it permission to exist.",
script:"The LORD said unto Satan, Behold, all that he hath is in thy power; only upon himself put not forth thine hand. (Job 1:12)",col:'#FFD700'},

{id:'tzimtzum',heb:'צמצום',hebn:'Tzimtzum',title:'Contraction & Incarnation',
rabbinic:"Isaac Luria (1534–1572) taught that God contracted (צמצום) to make space for creation. The Infinite (Ein Soph) withdrew its light to create an empty space (חלל הפנוי) in which finite beings could exist. Without contraction, there would be no 'room' for a world — the divine presence would fill all space and nothing other than God could be. Tzimtzum is God's supreme act of generosity: making Himself absent so that others might be present. The residual light left behind (רשימו, reshimu) is the trace of divinity still present in the empty space, the faintest luminosity that prevents the void from becoming absolute nothingness.",
christian:"Christian Kabbalah recognizes Tzimtzum as one half of a complementary mystery. The other half is the Incarnation. God *contracts* to create space for a world (Tzimtzum), then God *enters into* that space to redeem it (Incarnation). The withdrawal creates Malkuth — the empty vessel, the virgin womb, the material world. The Incarnation fills Malkuth — the Word made flesh, the divine presence returning to the space it vacated. Kircher and Thomas Vaughan both saw this: the Shekinah withdraws into exile (Lurianic doctrine), then returns as the indwelling Spirit (Christian Pentecost). The two movements are the systole and diastole of the divine heart.",
practical:"When the app shows the Four Worlds modal, you are seeing the stages of Tzimtzum: from Atziluth (where God is fully present) through Beriah, Yetzirah, and Assiah (where God's presence is increasingly veiled). Under the ✝ lens, the Incarnation reverses the direction: Christ descends *through* the Four Worlds from Atziluth to Assiah, filling each with presence rather than absence. Every Sephirah is simultaneously a stage of divine withdrawal (Tzimtzum) and a stage of divine return (Incarnation). The Tree of Life breathes in both directions at once.",
script:"And the Word was made flesh, and dwelt among us, and we beheld his glory, the glory as of the only begotten of the Father, full of grace and truth. (John 1:14)",col:'#4A7BF7'},

{id:'shevirah',heb:'שבירת הכלים',hebn:'Shevirat ha-Kelim',title:'The Breaking of the Vessels',
rabbinic:"After the Tzimtzum, divine light poured into the empty space to form the ten Sephiroth. But the vessels (kelim) of the lower seven Sephiroth could not contain the force of the light and shattered (שבירה). The shards of the broken vessels fell into the lowest realms, becoming the Qliphoth — husks or shells that retain the *shape* of divine functions but have lost the *light* they were meant to carry. Trapped within each shard are sparks (ניצוצות) of the original divine light, still present but imprisoned in broken forms. The entirety of creation as we experience it is the aftermath of this catastrophe.",
christian:"Christian Kabbalah identifies the Shevirah with the cosmic Fall — not merely Adam's personal sin but the structural breaking of creation itself. This is the 'groaning of creation' Paul describes in Romans 8:22: all of nature waiting for redemption from a structural distortion that precedes human history. The Fall is not just a moral event but an ontological one: the vessels of reality itself broke, and every created thing now carries both a spark of divine light and a shell of brokenness. The Qliphoth are not demons in the personal sense — they are the broken remains of what was meant to be vessels of God.",
practical:"This changes how you read the entire Beings tab. The Goetia spirits are not 'evil spirits' but *broken vessels* — divine functions that shattered and now operate in distorted form. Bael's invisibility is a *broken* version of Kether's transcendence. Paimon's arts and sciences are a *broken* version of Chesed's abundant knowledge. Astaroth's lamenting memory of the angelic fall is the vessel *remembering* what it once was. The defense system works by reasserting the vessel's original form through the divine Name — not by destroying the spirit but by reminding it of the shape it was meant to hold.",
script:"For the earnest expectation of the creature waiteth for the manifestation of the sons of God. For the creature was made subject to vanity, not willingly, but by reason of him who hath subjected the same in hope. (Romans 8:19-20)",col:'#DC3545'},

{id:'qliphoth',heb:'קליפות',hebn:'Qliphoth',title:'Husks, Not Demons',
rabbinic:"The Hebrew word Qliphah (קליפה) literally means 'husk' or 'peel' — the dead outer layer of a fruit or nut. The Qliphoth are not *evil beings* but *empty structures*: vessels that broke during the Shevirah and now maintain the shape of divine functions without the divine light. They attract because they still *look* like what they once contained. The Qliphah of Chesed (Gasheklah, 'the Smiters') is not a being that *hates* mercy — it is the empty *husk* of mercy: generosity without wisdom, excess without form, a broken vessel pouring itself out into nothing. The Zohar is explicit: the Qliphoth have no independent existence. They subsist only on the residual light trapped within them.",
christian:"Christian demonology tends to personalize evil — demons with names, intentions, and personal malice. Christian Kabbalah restores the impersonal, structural understanding. The Qliphoth are not *choosing* evil; they are *constitutionally incapable* of good because they are broken vessels. You cannot negotiate with a broken cup — you can only repair it or replace it. This is why the grimoire tradition uses divine Names rather than persuasion: the Name doesn't convince the Qliphah to behave — it *restructures* the vessel by reasserting the original divine pattern. Christ's authority over 'unclean spirits' in the Gospels operates on this principle: he doesn't argue with them, he commands — because the broken vessel cannot reason, it can only be re-formed.",
practical:"When you see a Qliphothic shadow listed for any Sephirah in the Study tab, read it as the *empty version* of the virtue above it. Tiphareth's vice is Pride — not because a demon of pride attacks beauty, but because Beauty without its divine light becomes self-admiration: the vessel is the same shape but holds nothing. The Goetia defense system addresses this: the seed defense letter and seal letter are tools for *re-forming* the broken vessel, not for combating a conscious adversary.",
script:"Woe unto them that call evil good, and good evil; that put darkness for light, and light for darkness; that put bitter for sweet, and sweet for bitter! (Isaiah 5:20)",col:'#c03030'},

{id:'tikkun',heb:'תיקון',hebn:'Tikkun',title:'Repair — Sacrament & Commandment',
rabbinic:"Tikkun (תיקון, 'repair') is the purpose of human existence in Lurianic Kabbalah. The 613 mitzvot (commandments) of the Torah are the specific tools of repair — each mitzvah addresses a particular break in the vessel-structure of creation. Keeping the Sabbath repairs the vessel of Binah. Acts of lovingkindness repair the vessel of Chesed. Study of Torah repairs the vessel of Tiphareth. The practitioner who performs mitzvot is literally reassembling the shattered vessels and releasing the trapped sparks. Tikkun is not a metaphor — it is the actual mechanics of cosmic restoration operating through specific human actions.",
christian:"Christian Kabbalah maps the seven Sacraments onto the same repair function. Baptism repairs the vessel of Chesed (mercy given before merit). Penance repairs Geburah (severity that purifies through honest naming). The Eucharist repairs Tiphareth (the Sun-centre, the Body of Christ filling the central vessel). Confirmation repairs Netzach (the Spirit's creative power). Holy Orders repairs Hod (the Word spoken with divine authority). Matrimony repairs Yesod (the foundational bond). Anointing of the Sick repairs Malkuth (the body as vessel of the divine). The Sacraments perform the same work as the mitzvot through a different operative channel: Christ rather than Torah, but the repair is structurally identical.",
practical:"Every sacrament listed in the CKAB_SEPH_DEEP data corresponds to the Sephirah whose vessel it repairs. This is not decorative — it is the operative mechanism. When you see a Sephirah's 'vice' (the Qliphothic distortion), the corresponding sacrament is the *specific tool* for repairing that distortion. Tiphareth's vice is Pride; the Eucharist repairs it by placing God's body in your hands rather than your ego at the centre. The app maps this throughout: sacrament → Sephirah → virtue → vice → repair.",
script:"He hath shewed thee, O man, what is good; and what doth the LORD require of thee, but to do justly, and to love mercy, and to walk humbly with thy God? (Micah 6:8)",col:'#4ade80'},

{id:'neshamah',heb:'נשמה',hebn:'Neshamah',title:'The Architecture of the Soul',
rabbinic:"Kabbalah teaches a five-level soul: Nefesh (נפש, animal vitality — seated in the liver and blood), Ruach (רוח, emotional-intellectual spirit — seated in the heart), Neshamah (נשמה, divine breath — the God-awareness that descends from above), Chayah (חיה, living essence — the soul's participation in the cosmic life of Atziluth), and Yechidah (יחידה, unity — the point at which the soul and God are indistinguishable). These levels correspond to the Four Worlds: Nefesh to Assiah, Ruach to Yetzirah, Neshamah to Beriah, and Chayah-Yechidah to Atziluth. Most human beings operate primarily from Nefesh and Ruach; the Neshamah must be actively awakened through prayer, study, and practice.",
christian:"Christian theology teaches body, soul, and spirit (1 Thessalonians 5:23). Christian Kabbalah maps: Nefesh = the body and its animal vitality (what Paul calls 'the flesh'). Ruach = the psyche, the emotional-intellectual self (what Paul calls 'the soul'). Neshamah = the Holy Spirit dwelling within (what Paul calls 'the spirit'). The two highest levels — Chayah and Yechidah — are experienced in Christian mysticism as the 'spark of the soul' (Eckhart's Seelenfünklein) or the 'fine point of the spirit' (John of the Cross's 'apex mentis'). Teresa of Ávila's Interior Castle maps the seven mansions onto the soul's ascent from Nefesh (outer mansions) through Ruach (middle mansions) to the mystical marriage at the centre (Neshamah touching Yechidah).",
practical:"When the app shows soul faculties for the Shem angels (the 'Soul Faculty — Lurianic Kabbalah' card), these are capacities of the Neshamah — the divine breath in you that resonates with the angel's domain. Under the ✝ lens, these faculties are gifts of the Spirit: the Neshamah IS the Spirit dwelling in you, and the Shem angel activates a specific capacity within that indwelling presence. Prayer and the Psalms are the primary tools for moving awareness from Nefesh (body-consciousness) upward through Ruach (heart-consciousness) to Neshamah (Spirit-consciousness).",
script:"And the very God of peace sanctify you wholly; and I pray God your whole spirit and soul and body be preserved blameless. (1 Thessalonians 5:23)",col:'#9B7BDB'},

{id:'daath',heb:'דעת',hebn:"Da'ath",title:'The Abyss & The Incarnation',
rabbinic:"Da'ath (דעת, 'Knowledge') is the hidden, unnumbered Sephirah — the knowledge born when Chokmah (Wisdom) and Binah (Understanding) unite. It has no permanent place on the Tree; it appears only when the Supernal Triad generates its child. Da'ath is located at the Abyss — the gap between the three highest Sephiroth (which are beyond ordinary human consciousness) and the seven lower Sephiroth (which constitute the experiential world). Crossing the Abyss means the dissolution of the personal self: the lower identity cannot survive contact with the Supernal Triad. What crosses is no longer 'you' in any recognisable sense.",
christian:"In Christian Kabbalah, the Abyss IS the gap between Creator and creation that the Incarnation bridges. Christ is Da'ath — the Knowledge of God made accessible to the lower Tree. Before the Incarnation, the Abyss was uncrossable from below; the Supernal Triad (the Trinity) was beyond reach. The Incarnation is God crossing the Abyss from above — descending from Kether through Chokmah and Binah, passing through Da'ath, and arriving at Tiphareth in human form. The Cross stands at Da'ath: the point of maximum tension between infinite God and finite creation, where the vessels nearly break again but hold — because this time the Light itself is doing the descending.",
practical:"When the Tree tab shows Da'ath as the hidden Sephirah, and the Christian lens mentions the 'dark night of the soul,' it is describing this crossing: the mystic's ego dissolving as consciousness approaches the Abyss. Under the ✝ lens, the crossing is possible because Christ has already made it — the mystic follows a path already walked. John of the Cross's 'dark night' is not the soul approaching the Abyss alone; it is the soul being carried through by the one who already crossed. This is why the patron mystic of Binah is John of the Cross: he maps the experiential reality of the Abyss-crossing more precisely than any other Christian writer.",
script:"I am the way, the truth, and the life: no man cometh unto the Father, but by me. (John 14:6)",col:'#9B7BDB'},

{id:'authority',heb:'שלטון',hebn:'Shilton',title:'The 72 Names Under New Authority',
rabbinic:"In the rabbinic tradition, the 72 Names of the Shemhamphorasch derive their authority directly from Torah — specifically from the three verses of Exodus 14:19-21 that describe the parting of the Red Sea. The Names are operative because they are woven from the fabric of Scripture itself: they are not arbitrary combinations but the actual letters God spoke when He divided the waters. Their authority is the authority of the Torah, and they are invoked within the covenant framework established at Sinai. The practitioner who uses them positions himself within the Mosaic covenant and operates under its terms.",
christian:"Christian Kabbalah does not deny the Torah-authority of the 72 Names — it *subsumes* it under a higher authority. Reuchlin (De Verbo Mirifico, 1494) argues that the insertion of Shin into YHVH to produce YHShVH does not destroy the Tetragrammaton but *completes* it: the Father's Name becomes the Son's Name, which becomes the Name above every name (Philippians 2:9). The 72 Names retain their structure, their domains, their Psalm correspondences, and their operative power — but their chain of command now runs through the Pentagrammaton. The Shem angels serve the same God; the channel through which authority flows has been widened by the Incarnation to include all who invoke the five-letter Name.",
practical:"Every Shem angel card shows the 'Operated Under YHShVH' section when the ✝ lens is active. This is not decoration — it reflects a genuine doctrinal position about the authority structure. The defense system built into the Goetia cards computes offsets from 326 (YHShVH) precisely because the Christian Kabbalist asserts that Christ's Name is the operative apex. In practice: invoke the Shem angel by name, recite its Psalm, but frame the invocation within the Name of YHShVH. The formula is: 'In the Name of YHShVH, by the authority of [Shem angel], I petition for [domain].' The five-letter Name is not a replacement for the 72 — it is the seal that authenticates them.",
script:"Wherefore God also hath highly exalted him, and given him a name which is above every name: That at the name of Jesus every knee should bow, of things in heaven, and things in earth, and things under the earth. (Philippians 2:9-10)",col:'#FFD700'}

const CKAB_GLOSSARY=[
{term:'Sephirah',heb:'ספירה',pl:'Sephiroth',def:'A divine emanation or attribute — one of the ten stages through which God manifests reality. From the root saphar (ספר, "to count/tell/shine"). Each Sephirah is simultaneously a number, a name, and a quality of light.',gem:355,ckab:'The ten Sephiroth map to the Trinity (Sephiroth 1-3) and the seven operative divine attributes through which God acts in creation via the Sacraments (Sephiroth 4-10).'},
{term:'Qliphah',heb:'קליפה',pl:'Qliphoth',def:'A husk, shell, or peel — the dead outer structure of a broken vessel. Not a demon but an empty form: the shape of a divine function without the divine light it was meant to contain.',gem:215,ckab:'The Qliphoth are the structural aftermath of the cosmic Fall. Christ\'s authority over them operates by reasserting the vessel\'s original pattern through the Name.'},
{term:'Tikkun',heb:'תיקון',pl:'Tikkunim',def:'Repair, rectification, restoration. The process of reassembling the broken vessels and releasing the divine sparks trapped in the Qliphoth. The purpose of human existence.',gem:566,ckab:'The Sacraments are the Christian instruments of Tikkun. Each sacrament repairs a specific Sephirothic vessel.'},
{term:'Tzimtzum',heb:'צמצום',pl:'',def:'Contraction, withdrawal. God\'s self-limitation to create space for a world. The supreme act of divine generosity: making oneself absent so that the other might exist.',gem:226,ckab:'One half of the Incarnation mystery. God withdraws (Tzimtzum) then enters (Incarnation). The systole and diastole of the divine heart.'},
{term:'Reshut',heb:'רשות',pl:'Reshuyot',def:'Permission, authority, domain. Every spiritual force operates within divinely granted permission. Authority can be delegated, bounded, and revoked by invoking the divine Name.',gem:906,ckab:'The grimoire tradition depends on Reshut. The operator invokes divine Names to reassert the permission structure, not to overpower spirits.'},
{term:'Neshamah',heb:'נשמה',pl:'Neshamot',def:'Divine breath — the third and highest commonly accessible level of the soul. Breathed into Adam by God (Gen 2:7). The capacity for God-awareness.',gem:395,ckab:'In Christian reading, the Neshamah is the Holy Spirit dwelling within. The Shem angels activate specific faculties of this indwelling presence.'},
{term:'Shekinah',heb:'שכינה',pl:'',def:'The divine presence as it dwells in the world. Feminine in gender. In rabbinic Kabbalah, the Shekinah is in exile — separated from the Holy One by the breaking of the vessels.',gem:385,ckab:'Christian Kabbalah identifies the Shekinah with the Virgin Mary (Malkuth) and with the Church (Ecclesia) — the earthly vessel of divine indwelling.'},
{term:'Ain Soph',heb:'אין סוף',pl:'',def:'Without limit. The infinite divine essence before any self-expression or emanation. Beyond all names, attributes, and categories. The sea without a shore.',gem:207,ckab:'The Godhead beyond God — what Eckhart calls the "desert" and John of the Cross calls the "dark night." The Trinity emerges from Ain Soph; Ain Soph exceeds the Trinity.'},
{term:'Klippah',heb:'קליפה',pl:'Klippot',def:'See Qliphah. Alternative transliteration of the same term. Both forms appear in scholarly literature.',gem:215,ckab:'Identical to Qliphah entry.'},
{term:'Merkavah',heb:'מרכבה',pl:'Merkavot',def:'Chariot — the divine throne-chariot of Ezekiel\'s vision (Ez 1). The four living creatures bearing the throne correspond to the four Worlds, four elements, and four Evangelists.',gem:267,ckab:'The four living creatures of the Merkavah are the four Evangelists: Matthew (Man/Aquarius), Mark (Lion/Leo), Luke (Bull/Taurus), John (Eagle/Scorpio). The chariot carries the Logos.'},
{term:'Notariqon',heb:'נוטריקון',pl:'',def:'The art of acronyms — extracting initials from phrases or expanding single words into phrases. One of the three pillars of Kabbalistic hermeneutics alongside Gematria and ATBaSh.',gem:375,ckab:'AGLA (אגלא) = Atah Gibor Leolam Adonai. The Notariqon of divine phrases creates operative Names used throughout the grimoire tradition.'},
{term:'Partzuf',heb:'פרצוף',pl:'Partzufim',def:'Face, persona, configuration. In Lurianic Kabbalah, the Sephiroth reorganise into Partzufim — divine personas with relational structure. Abba (Father), Imma (Mother), Zeir Anpin (Son), Nukva (Daughter).',gem:376,ckab:'The Partzufim map directly to Christian Trinitarian theology: Abba = Father, Imma = Holy Spirit (feminine, proceeding), Zeir Anpin = the Son, Nukva = the Church/Mary.'}
];

// Anchor A = YHShVH (326). Anchor B = gematria of Shem correspondent's Hebrew root.

const DEFENSE_SEEDS={
1:{l:'א',n:'Aleph',act:'Silence — cease all speech. Aleph is the breath of God before the Word. The defense is holy stillness; the spirit cannot operate in the silence of the Uncreated.',col:'#FFFFFF'},
2:{l:'ב',n:'Beth',act:'Containment — the House of God. Draw the circle firmly. Beth is the first letter of Genesis: creation begins with boundary. The spirit cannot operate outside the structure Beth imposes.',col:'#8888FF'},
3:{l:'ג',n:'Gimel',act:'Exile — the Camel carries burdens across the desert. Command the spirit to depart to its appointed place. Gimel is the force that delivers and removes.',col:'#222244'},
4:{l:'ד',n:'Daleth',act:'The Door — shut the gate. Seal every threshold: physical, mental, spiritual. The spirit\'s influence passes through openings in attention; Daleth closes them.',col:'#4A7BF7'},
5:{l:'ה',n:'He',act:'The Window — admit divine light. Open the Psalm to the sky. He is the breath of God entering creation; the spirit cannot endure the transparency this letter commands.',col:'#DC3545'},
6:{l:'ו',n:'Vav',act:'The Nail — fix the spirit in place. Assert human authority (6th day of creation). Speak the Shem angel\'s name to pin the entity. Vav is the hook between heaven and earth.',col:'#FFD700'},
7:{l:'ז',n:'Zayin',act:'The Sword — Geburah\'s blade descending. Cut the connection cleanly. The spirit\'s influence is severed by the divine name spoken with controlled force.',col:'#E87BA8'},
8:{l:'ח',n:'Cheth',act:'The Fence — the wall of living protection. Encircle yourself with the 8-fold name Elohim Tzabaoth. Cheth is the boundary no Qliphah can cross.',col:'#9B7BDB'},
9:{l:'ט',n:'Teth',act:'The Serpent Reversed — turn the spirit\'s own force back upon itself. Teth coils power inward. Speak the spirit\'s name, then speak it backwards: this binds it with its own emanation.',col:'#B8C6D4'}
};
function digitalRoot(n){let d=Math.abs(n);while(d>9){let s=0;for(const c of String(d))s+=parseInt(c);d=s;}return d||9;}
function goetDefense(sN){
const YHSHVH=326;const shem=SHEM72[sN-1];const spirit=G[sN-1];
// Anchor B: gematria of Shem root letters
const shemVal=gemHeb(shem.heb);
// Offset 1: Christ's Name vs spirit's Shem frequency
const off1=Math.abs(YHSHVH-shemVal);
const dr1=digitalRoot(off1);
// Offset 2: Psalm vs spirit number
const off2=Math.abs(shem.ps-sN);
const dr2=digitalRoot(off2);
// Seal = sum of offsets
const seal=off1+off2;const drSeal=digitalRoot(seal);
// Ana B'Koach line (cycle through 7 lines based on spirit number)
const abLine=ANA_BKOACH[(sN-1)%7];
// Tier-specific: for tier 4, use line 2 (Ka-ra Sa-tan = adversary shatterer)
const abTier4=ANA_BKOACH[1];
// Seed defense letter
const seedL=DEFENSE_SEEDS[dr1];
// Seal letter
const sealL=DEFENSE_SEEDS[drSeal];
// Sephirah of planet
const sephN=PLANET_SEPH[spirit.pl]||6;
const ckdDeep=CKAB_SEPH_DEEP[sephN-1];
return{off1,off2,seal,dr1,dr2,drSeal,seedL,sealL,shemVal,shem,spirit,abLine,abTier4,sephN,ckdDeep};
}

// ═══ CHRISTIAN KABBALAH — LETTER READINGS ═══
// Each letter through the Christological lens: what changes, what deepens
const CKAB_LETTERS={
// MOTHERS → TRINITY
'א':{cls:'Trinity',role:'The Father — Breath before the Word',reading:'Aleph is the Father as He exists before speaking. "In the beginning was the Word" (John 1:1) — but before the Word is the Breath that will carry it. Aleph is the silence of the Father from which the Logos proceeds. In Jewish Kabbalah, Aleph is Air; in Christian Kabbalah, Aleph is the Father\'s first Person — the one who breathes the Spirit and speaks the Son. "I am the Alpha and the Omega" (Rev 1:8) — Alpha IS Aleph.',col:'#FFFFFF',ico:'I'},
'מ':{cls:'Trinity',role:'The Son — Water of the Incarnation',reading:'Mem is the Son as baptismal water: "Unless a man be born of water and of the Spirit, he cannot enter into the kingdom of God" (John 3:5). The Messiah comes from the waters — the Zohar already taught this. Christ descends into the Jordan and the waters of Mem receive Him. In Jewish Kabbalah, Mem is the primal sea; in Christian Kabbalah, Mem is the womb of Mary (Malkuth) receiving the divine seed — water that becomes flesh.',col:'#4A7BF7',ico:'II'},
'ש':{cls:'Trinity',role:'The Holy Spirit — Fire of Pentecost',reading:'Shin IS the Incarnation. This is the central mystery of Christian Kabbalah: the letter Shin (300, Fire, Holy Spirit) is inserted into the Tetragrammaton YHVH to produce YHShVH (326). The Father\'s Name becomes speakable in matter. Shin\'s three prongs are the three Persons of the Trinity in one flame. At Pentecost (Acts 2:3) "there appeared unto them cloven tongues as of fire" — the Shin descending onto each apostle. In Jewish Kabbalah, Shin is Fire; in Christian Kabbalah, Shin is the specific act by which God entered human history.',col:'#FFD700',ico:'III'},
// DOUBLES → SACRAMENTS
'ב':{cls:'Sacrament',role:'Baptism — The House of New Life',reading:'Beth is the first letter of Torah: B\'reshit ("In the beginning"). In Christian reading, Beth is the house of Baptism — the sacrament that creates a new beginning. As Beth is the container that makes space for creation, the baptismal font is the vessel that makes space for divine life in the soul. The Moon governs Beth: Yesod\'s astral foundation, the threshold between spiritual and material, is where Baptism operates.',col:'#B8C6D4',sacr:'Baptism'},
'ג':{cls:'Sacrament',role:'Confirmation — The Gift-Bearer',reading:'Gimel is the camel carrying gifts across the desert: grace travelling to reach the recipient. Confirmation is the sacrament in which the sevenfold Gift of the Spirit descends. Jupiter governs Gimel: the expansive generosity of Chesed poured out as the Spirit\'s strengthening. The bishop\'s hand on the forehead is Gimel delivering what was promised at Baptism.',col:'#4A7BF7',sacr:'Confirmation'},
'ד':{cls:'Sacrament',role:'Penance — The Door of Mercy',reading:'Daleth is the Door: "I am the door: by me if any man enter in, he shall be saved" (John 10:9). Confession is the sacrament of the open door — the soul\'s poverty (Daleth = the poor man) standing before divine mercy. Mars governs Daleth: Geburah\'s severity expressed as the honest naming of sin. The confessional is Daleth: a threshold that opens only with humility.',col:'#DC3545',sacr:'Penance'},
'כ':{cls:'Sacrament',role:'Eucharist — The Palm that Receives God',reading:'Kaph is the open palm: the hands of the communicant receiving the Body of Christ. The Sun governs Kaph: Tiphareth, the solar centre, the Christ-point of the Tree. The Eucharist IS the Tiphareth sacrament — God physically entering matter through bread and wine. Kaph is the crown (Kether) made holdable — divinity placed in human hands.',col:'#FFD700',sacr:'Eucharist'},
'פ':{cls:'Sacrament',role:'Holy Orders — The Mouth that Speaks God',reading:'Pe is the Mouth: the priest who speaks the Words of Consecration speaks with the mouth of God. "Hoc est corpus meum." Mercury governs Pe: Hod\'s intellectual precision applied to the most powerful speech act in creation — the transformation of bread into Body. Pe has two forms (open and closed mouth): the priest speaks in liturgy and is silent in contemplation.',col:'#9B7BDB',sacr:'Holy Orders'},
'ר':{cls:'Sacrament',role:'Matrimony — The Face Turned Toward the Beloved',reading:'Resh is the Head: the face turned toward another in love. Matrimony is the sacrament in which two faces choose to face each other permanently. Saturn governs Resh: the deep patience of Binah expressed as the lifelong covenant. Resh governs peace and strife — the married life contains both, sanctified by the vow. The wedding at Cana (John 2) is Resh in action.',col:'#222244',sacr:'Matrimony'},
'ת':{cls:'Sacrament',role:'Anointing of the Sick — The Cross-Mark on the Forehead',reading:'Tav is the Cross. Its ancient form was literally ✝. In Ezekiel 9:4, God commands: "Set a mark (Tav) upon the foreheads of the men that sigh and that cry." This IS the Sign of the Cross — the same mark placed on the dying in the Anointing of the Sick. Venus governs Tav: Netzach\'s life-force expressed as the final tenderness. Tav seals creation; Anointing seals the life. "I am Alpha and Omega" — Aleph and Tav, beginning and end, Father and Cross.',col:'#E87BA8',sacr:'Anointing'},
// SIMPLES → APOSTLES
'ה':{cls:'Apostle',role:'Peter — The Window of Revelation',reading:'He is the Window through which divine light enters. Peter received the revelation: "Thou art the Christ, the Son of the living God" (Matt 16:16) — the window opened. He is the letter of breath (the divine name YHVH contains two He\'s — the breath of the Father and the breath of the Church). Peter is the rock on which the breath rests. Aries governs He: the initiative, the first-called.',col:'#c44520',apo:'Peter'},
'ו':{cls:'Apostle',role:'Andrew — The Hook Between Worlds',reading:'Vav is the hook, the nail, the connector between heaven and earth. Andrew was the first to follow: "Come and see" (John 1:39). He connects the Baptist (the old dispensation) to Christ (the new). Taurus governs Vav: the earthy stability of the one who simply followed. Andrew\'s X-shaped cross is the Vav extended in all four directions.',col:'#5a7a3a',apo:'Andrew'},
'ז':{cls:'Apostle',role:'James the Greater — The Sword',reading:'Zayin is the Sword: James was the first apostle martyred by the sword (Acts 12:2). He is the blade of Geburah wielded by Herod yet claimed by Christ. Gemini governs Zayin: James and John are the twin "Sons of Thunder" — the double-edged testimony.',col:'#7a9ab0',apo:'James'},
'ח':{cls:'Apostle',role:'John the Beloved — The Enclosure of Intimacy',reading:'Cheth is the Fence, the sacred enclosure. John leaned on Christ\'s breast at the Last Supper (John 13:23) — the intimate enclosure of love. Cancer governs Cheth: the womb, the inner chamber, the private revelation. John\'s Gospel is the most "interior" — Cheth\'s mystery of the enclosed space where God is known most directly.',col:'#2a4a8a',apo:'John'},
'ט':{cls:'Apostle',role:'Philip — The Hidden Good',reading:'Teth is the Serpent containing hidden good. Philip asked: "Lord, show us the Father" (John 14:8) — seeking the concealed divinity within the visible Christ. Leo governs Teth: the royal power concealed within the humble teacher. Philip found Nathanael and said "Come and see" — the invitation to discover hidden goodness.',col:'#c44520',apo:'Philip'},
'י':{cls:'Apostle',role:'Bartholomew/Nathanael — The Creative Point',reading:'Yod is the smallest letter yet contains all others: the seed-point. Nathanael sat under the fig tree when Christ saw him (John 1:48) — the hidden seed recognized before it sprouted. Virgo governs Yod: the meticulous attention to the smallest sign. "Behold, an Israelite in whom there is no guile" — Yod\'s purity.',col:'#5a7a3a',apo:'Bartholomew'},
'ל':{cls:'Apostle',role:'Matthew — The Aspiring Learner',reading:'Lamed is the tallest letter: aspiration, learning, the heart reaching upward. Matthew left the tax booth to follow — the radical reorientation of Lamed. Libra governs Lamed: the scales of the tax collector balanced against the scales of the Kingdom. Matthew wrote the Gospel of the Church: Lamed\'s teaching impulse made permanent.',col:'#7a9ab0',apo:'Matthew'},
'נ':{cls:'Apostle',role:'Thomas — The Fish in Deep Water',reading:'Nun is the Fish: faithful persistence through the depths. Thomas doubted, then plunged his hand into the wound and said "My Lord and my God" (John 20:28) — the deepest confession from the deepest doubt. Scorpio governs Nun: death and resurrection, the descent that precedes the most profound recognition.',col:'#2a4a8a',apo:'Thomas'},
'ס':{cls:'Apostle',role:'James the Less — The Quiet Support',reading:'Samekh is the Prop, the support. James the Less is the quiet pillar of the Jerusalem church — the one who held things together without seeking visibility. Sagittarius governs Samekh: the archer who supports from behind the line. "The eternal God is thy refuge, and underneath are the everlasting arms."',col:'#c44520',apo:'James the Less'},
'ע':{cls:'Apostle',role:'Jude/Thaddaeus — The Eye that Sees',reading:'Ayin is the Eye: "Lord, how is it that thou wilt manifest thyself unto us, and not unto the world?" (John 14:22). Jude asks the question of spiritual sight — why do some see and others not? Capricorn governs Ayin: the disciplined vision that earns revelation through patience.',col:'#5a7a3a',apo:'Jude'},
'צ':{cls:'Apostle',role:'Simon the Zealot — The Righteous Hook',reading:'Tzaddi is the Fishhook of the righteous: Simon the Zealot burned with zeal for God\'s law before channelling that fire into apostolic mission. Aquarius governs Tzaddi: the radical idealism that, rightly directed, draws souls upward.',col:'#7a9ab0',apo:'Simon'},
'ק':{cls:'Apostle',role:'Matthias — The Hidden Holiness',reading:'Qoph is the back of the head: holiness dwelling in the unconscious, in sleep, in the parts unseen. Matthias was chosen by lot to replace Judas (Acts 1:26) — the hidden apostle, the one God chose from behind the scenes. Pisces governs Qoph: the final dissolution of the old and the hidden beginning of the new.',col:'#2a4a8a',apo:'Matthias'}
};

45:["My heart is inditing a good matter: I speak of the things which I have made touching the king: my tongue is the pen of a ready writer.","Thou art fairer than the children of men: grace is poured into thy lips: therefore God hath blessed thee for ever.","Gird thy sword upon thy thigh, O most mighty, with thy glory and thy majesty.","And in thy majesty ride prosperously because of truth and meekness and righteousness; and thy right hand shall teach thee terrible things.","Thine arrows are sharp in the heart of the king's enemies; whereby the people fall under thee.","Thy throne, O God, is for ever and ever: the sceptre of thy kingdom is a right sceptre.","Thou lovest righteousness, and hatest wickedness: therefore God, thy God, hath anointed thee with the oil of gladness above thy fellows.","All thy garments smell of myrrh, and aloes, and cassia, out of the ivory palaces, whereby they have made thee glad.","Kings' daughters were among thy honourable women: upon thy right hand did stand the queen in gold of Ophir.","Hearken, O daughter, and consider, and incline thine ear; forget also thine own people, and thy father's house;","So shall the king greatly desire thy beauty: for he is thy Lord; and worship thou him.","And the daughter of Tyre shall be there with a gift; even the rich among the people shall intreat thy favour.","The king's daughter is all glorious within: her clothing is of wrought gold.","She shall be brought unto the king in raiment of needlework: the virgins her companions that follow her shall be brought unto thee.","With gladness and rejoicing shall they be brought: they shall enter into the king's palace.","Instead of thy fathers shall be thy children, whom thou mayest make princes in all the earth.","I will make thy name to be remembered in all generations: therefore shall the people praise thee for ever and ever."],
91:["He that dwelleth in the secret place of the most High shall abide under the shadow of the Almighty.","I will say of the LORD, He is my refuge and my fortress: my God; in him will I trust.","Surely he shall deliver thee from the snare of the fowler, and from the noisome pestilence.","He shall cover thee with his feathers, and under his wings shalt thou trust: his truth shall be thy shield and buckler.","Thou shalt not be afraid for the terror by night; nor for the arrow that flieth by day;","Nor for the pestilence that walketh in darkness; nor for the destruction that wasteth at noonday.","A thousand shall fall at thy side, and ten thousand at thy right hand; but it shall not come nigh thee.","Only with thine eyes shalt thou behold and see the reward of the wicked.","Because thou hast made the LORD, which is my refuge, even the most High, thy habitation;","There shall no evil befall thee, neither shall any plague come nigh thy dwelling.","For he shall give his angels charge over thee, to keep thee in all thy ways.","They shall bear thee up in their hands, lest thou dash thy foot against a stone.","Thou shalt tread upon the lion and adder: the young lion and the dragon shalt thou trample under feet.","Because he hath set his love upon me, therefore will I deliver him: I will set him on high, because he hath known my name.","He shall call upon me, and I will answer him: I will be with him in trouble; I will deliver him, and honour him.","With long life will I satisfy him, and shew him my salvation."],
103:["Bless the LORD, O my soul: and all that is within me, bless his holy name.","Bless the LORD, O my soul, and forget not all his benefits:","Who forgiveth all thine iniquities; who healeth all thy diseases;","Who redeemeth thy life from destruction; who crowneth thee with lovingkindness and tender mercies;","Who satisfieth thy mouth with good things; so that thy youth is renewed like the eagle's.","The LORD executeth righteousness and judgment for all that are oppressed.","He made known his ways unto Moses, his acts unto the children of Israel.","The LORD is merciful and gracious, slow to anger, and plenteous in mercy.","He will not always chide: neither will he keep his anger for ever.","He hath not dealt with us after our sins; nor rewarded us according to our iniquities.","For as the heaven is high above the earth, so great is his mercy toward them that fear him.","As far as the east is from the west, so far hath he removed our transgressions from us.","Like as a father pitieth his children, so the LORD pitieth them that fear him.","For he knoweth our frame; he remembereth that we are dust.","As for man, his days are as grass: as a flower of the field, so he flourisheth.","For the wind passeth over it, and it is gone; and the place thereof shall know it no more.","But the mercy of the LORD is from everlasting to everlasting upon them that fear him, and his righteousness unto children's children;","To such as keep his covenant, and to those that remember his commandments to do them.","The LORD hath prepared his throne in the heavens; and his kingdom ruleth over all.","Bless the LORD, ye his angels, that excel in strength, that do his commandments, hearkening unto the voice of his word.","Bless ye the LORD, all ye his hosts; ye ministers of his, that do his pleasure.","Bless the LORD, all his works in all places of his dominion: bless the LORD, O my soul."],
116:["I love the LORD, because he hath heard my voice and my supplications.","Because he hath inclined his ear unto me, therefore will I call upon him as long as I live.","The sorrows of death compassed me, and the pains of hell gat hold upon me: I found trouble and sorrow.","Then called I upon the name of the LORD; O LORD, I beseech thee, deliver my soul.","Gracious is the LORD, and righteous; yea, our God is merciful.","The LORD preserveth the simple: I was brought low, and he helped me.","Return unto thy rest, O my soul; for the LORD hath dealt bountifully with thee.","For thou hast delivered my soul from death, mine eyes from tears, and my feet from falling.","I will walk before the LORD in the land of the living.","I believed, therefore have I spoken: I was greatly afflicted:","I said in my haste, All men are liars.","What shall I render unto the LORD for all his benefits toward me?","I will take the cup of salvation, and call upon the name of the LORD.","I will pay my vows unto the LORD now in the presence of all his people.","Precious in the sight of the LORD is the death of his saints.","O LORD, truly I am thy servant; I am thy servant, and the son of thine handmaid: thou hast loosed my bonds.","I will offer to thee the sacrifice of thanksgiving, and will call upon the name of the LORD.","I will pay my vows unto the LORD now in the presence of all his people,","In the courts of the LORD's house, in the midst of thee, O Jerusalem. Praise ye the LORD."],
139:["O LORD, thou hast searched me, and known me.","Thou knowest my downsitting and mine uprising, thou understandest my thought afar off.","Thou compassest my path and my lying down, and art acquainted with all my ways.","For there is not a word in my tongue, but, lo, O LORD, thou knowest it altogether.","Thou hast beset me behind and before, and laid thine hand upon me.","Such knowledge is too wonderful for me; it is high, I cannot attain unto it.","Whither shall I go from thy spirit? or whither shall I flee from thy presence?","If I ascend up into heaven, thou art there: if I make my bed in hell, behold, thou art there.","If I take the wings of the morning, and dwell in the uttermost parts of the sea;","Even there shall thy hand lead me, and thy right hand shall hold me.","If I say, Surely the darkness shall cover me; even the night shall be light about me.","Yea, the darkness hideth not from thee; but the night shineth as the day: the darkness and the light are both alike to thee.","For thou hast possessed my reins: thou hast covered me in my mother's womb.","I will praise thee; for I am fearfully and wonderfully made: marvellous are thy works; and that my soul knoweth right well.","My substance was not hid from thee, when I was made in secret, and curiously wrought in the lowest parts of the earth.","Thine eyes did see my substance, yet being unperfect; and in thy book all my members were written, which in continuance were fashioned, when as yet there was none of them.","How precious also are thy thoughts unto me, O God! how great is the sum of them!","If I should count them, they are more in number than the sand: when I awake, I am still with thee.","Surely thou wilt slay the wicked, O God: depart from me therefore, ye bloody men.","For they speak against thee wickedly, and thine enemies take thy name in vain.","Do not I hate them, O LORD, that hate thee? and am not I grieved with those that rise up against thee?","I hate them with perfect hatred: I count them mine enemies.","Search me, O God, and know my heart: try me, and know my thoughts:","And see if there be any wicked way in me, and lead me in the way everlasting."],
150:["Praise ye the LORD. Praise God in his sanctuary: praise him in the firmament of his power.","Praise him for his mighty acts: praise him according to his excellent greatness.","Praise him with the sound of the trumpet: praise him with the psaltery and harp.","Praise him with the timbrel and dance: praise him with stringed instruments and organs.","Praise him upon the loud cymbals: praise him upon the high sounding cymbals.","Let every thing that hath breath praise the LORD. Praise ye the LORD."]

49:["And Jacob called unto his sons, and said, Gather yourselves together, that I may tell you that which shall befall you in the last days.","Gather yourselves together, and hear, ye sons of Jacob; and hearken unto Israel your father.","Reuben, thou art my firstborn, my might, and the beginning of my strength, the excellency of dignity, and the excellency of power:","Unstable as water, thou shalt not excel; because thou wentest up to thy father's bed; then defiledst thou it: he went up to my couch.","Simeon and Levi are brethren; instruments of cruelty are in their habitations.","O my soul, come not thou into their secret; unto their assembly, mine honour, be not thou united: for in their anger they slew a man, and in their selfwill they digged down a wall.","Cursed be their anger, for it was fierce; and their wrath, for it was cruel: I will divide them in Jacob, and scatter them in Israel.","Judah, thou art he whom thy brethren shall praise: thy hand shall be in the neck of thine enemies; thy father's children shall bow down before thee.","Judah is a lion's whelp: from the prey, my son, thou art gone up: he stooped down, he couched as a lion, and as an old lion; who shall rouse him up?","The sceptre shall not depart from Judah, nor a lawgiver from between his feet, until Shiloh come; and unto him shall the gathering of the people be.","Binding his foal unto the vine, and his ass's colt unto the choice vine; he washed his garments in wine, and his clothes in the blood of grapes:","His eyes shall be red with wine, and his teeth white with milk.","Zebulun shall dwell at the haven of the sea; and he shall be for an haven of ships; and his border shall be unto Zidon.","Issachar is a strong ass couching down between two burdens:","And he saw that rest was good, and the land that it was pleasant; and bowed his shoulder to bear, and became a servant unto tribute.","Dan shall judge his people, as one of the tribes of Israel.","Dan shall be a serpent by the way, an adder in the path, that biteth the horse heels, so that his rider shall fall backward.","I have waited for thy salvation, O LORD.","Gad, a troop shall overcome him: but he shall overcome at the last.","Out of Asher his bread shall be fat, and he shall yield royal dainties.","Naphtali is a hind let loose: he giveth goodly words.","Joseph is a fruitful bough, even a fruitful bough by a well; whose branches run over the wall:","The archers have sorely grieved him, and shot at him, and hated him:","But his bow abode in strength, and the arms of his hands were made strong by the hands of the mighty God of Jacob; (from thence is the shepherd, the stone of Israel:)","Even by the God of thy father, who shall help thee; and by the Almighty, who shall bless thee with blessings of heaven above, blessings of the deep that lieth under, blessings of the breasts, and of the womb:","The blessings of thy father have prevailed above the blessings of my progenitors unto the utmost bound of the everlasting hills: they shall be on the head of Joseph, and on the crown of the head of him that was separate from his brethren.","Benjamin shall ravin as a wolf: in the morning he shall devour the prey, and at night he shall divide the spoil.","All these are the twelve tribes of Israel: and this is it that their father spake unto them, and blessed them; every one according to his blessing he blessed them."]

e and war?","By what way is the light parted, which scattereth the east wind upon the earth?","Who hath divided a watercourse for the overflowing of waters, or a way for the lightning of thunder;","To cause it to rain on the earth, where no man is; on the wilderness, wherein there is no man;","To satisfy the desolate and waste ground; and to cause the bud of the tender herb to spring forth?","Hath the rain a father? or who hath begotten the drops of dew?","Out of whose womb came the ice? and the hoary frost of heaven, who hath gendered it?","The waters are hid as with a stone, and the face of the deep is frozen.","Canst thou bind the sweet influences of Pleiades, or loose the bands of Orion?","Canst thou bring forth Mazzaroth in his season? or canst thou guide Arcturus with his sons?","Knowest thou the ordinances of heaven? canst thou set the dominion thereof in the earth?"]

function getBibleText(bk,ch){
const emb=BIBLE[bk]&&BIBLE[bk][ch];
if(emb)return{src:'embedded',verses:emb};
if(BIBLE_LOADED&&BIBLE_LOADED[bk]&&BIBLE_LOADED[bk][ch])return{src:'loaded',verses:BIBLE_LOADED[bk][ch]};
return null;
}
function loadBibleFile(file){
const reader=new FileReader();
reader.onload=function(e){
try{BIBLE_LOADED=JSON.parse(e.target.result);render();alert('Bible loaded: '+Object.keys(BIBLE_LOADED).length+' books available.');}
catch(err){alert('Error parsing Bible file: '+err.message);}
};reader.readAsText(file);
}

function openProjection(pl,si,label){S.projOpen=true;S.projPl=pl;S.projSi=si;S.projLabel=label;render();}
function computeProjection(pl,si){
const now=new Date();const results=[];
for(let d=0;d<7&&results.length<12;d++){
const dt=new Date(now.getTime()+d*864e5);
const ph=pHours(dt,CFG.lat);const ms_=mSign(dt);const mp_=mPhase(dt);
ph.hours.forEach(h=>{
if(h.end<now)return;
let sc=0;const tags=[];
if(h.ruler===pl){sc+=3;tags.push(h.ruler+' hour');}
if(DR[dt.getDay()]===pl){sc+=2;tags.push('Day of '+pl);}
if(si&&ms_.sign===si){sc+=2;tags.push('☽ '+ms_.sign);}
const plEl={Sun:'Fire',Moon:'Water',Mars:'Fire',Mercury:'Air',Jupiter:'Fire',Venus:'Earth',Saturn:'Earth'};
if(plEl[pl]===ms_.el){sc+=1;tags.push(ms_.el+' Moon');}
if(sc>=3)results.push({dt,h,sc,tags,mp:mp_.name,ms:ms_.sign,day:fmtD(dt)});
});
}
return results.sort((a,b)=>b.sc-a.sc).slice(0,10);
}
function renderProjectionOverlay(){
if(!S.projOpen)return'';
const pl=S.projPl;const si=S.projSi;const label=S.projLabel||pl;
const col=pl?pc(pl):'#b89a42';

{l:"\u05d1",n:"Beth",v:2,t:"House",cls:"Double",el:"",pl:"Moon",zo:"",body:"Right eye",num:12,
form:"The first letter of the Torah (B\u2019reshit). The house, the container, the vessel that makes space for life. Wisdom as the dwelling-place of God.",
med:"Meditate on the threshold. Beth is the doorway between the outer world and the sacred interior. What house are you building in your soul?",
sv:"Wisdom hath builded her house; she hath hewn out her seven pillars. (Prov 9:1)"},
{l:"\u05d2",n:"Gimel",v:3,t:"Camel",cls:"Double",el:"",pl:"Jupiter",zo:"",body:"Right ear",num:13,
form:"Movement and abundance. The camel crosses the desert between two oases \u2014 it is the grace that bridges lack and plenty. The beneficence of God that travels great distances to reach you.",
med:"Consider what gift you carry for another. Gimel always moves toward Daleth, the poor and needy letter beside it. Generosity is written into creation.",
sv:"Every good gift and every perfect gift is from above. (James 1:17)"},
{l:"\u05d3",n:"Daleth",v:4,t:"Door",cls:"Double",el:"",pl:"Mars",zo:"",body:"Right nostril",num:14,
form:"The door through which grace enters. Poverty and receptivity as spiritual states. The door of the heart that must stand open.",
med:"What doors in you are closed? Daleth is the humility of needing and receiving. Sit with the discomfort of openness.",
sv:"Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened. (Matt 7:7)"},
{l:"\u05d4",n:"He",v:5,t:"Window",cls:"Simple",el:"",pl:"",zo:"Aries",body:"Right arm",num:15,
form:"The window through which divine light enters. He appears twice in the Tetragrammaton (YHVH). The outpouring and the receiving of divine breath \u2014 aspiration in both senses.",
med:"Open a window. Light and air move through without being held. He is the soul\u2019s capacity for both receiving and releasing the divine presence.",
sv:"The heavens declare the glory of God; and the firmament sheweth his handywork. (Ps 19:1)"},
{l:"\u05d5",n:"Vav",v:6,t:"Hook / Nail",cls:"Simple",el:"",pl:"",zo:"Taurus",body:"Right leg",num:16,
form:"The nail that connects. Vav is the conjunction in Hebrew \u2014 the word \u2018and\u2019, the connector of all things. It pins heaven to earth, the divine to the human, the spiritual to the material.",
med:"Find the connection. Where do you feel disconnected? Vav is the nail of attention that fixes you to what is real.",
sv:"And the Word was made flesh, and dwelt among us. (John 1:14)"},
{l:"\u05d6",n:"Zayin",v:7,t:"Sword",cls:"Simple",el:"",pl:"",zo:"Gemini",body:"Right hand",num:17,
form:"Discernment. The sword that divides truth from falsehood, the essential from the inessential. The Sabbath is connected to Zayin \u2014 the seventh day is the sharp edge that divides sacred time from ordinary time.",
med:"What needs cutting? Zayin is not violence but precision. What thought, habit, or attachment is the sword of discernment asking you to release?",
sv:"For the word of God is quick, and powerful, and sharper than any twoedged sword. (Heb 4:12)"},
{l:"\u05d7",n:"Cheth",v:8,t:"Fence",cls:"Simple",el:"",pl:"",zo:"Cancer",body:"Right foot",num:18,
form:"The enclosure, the sanctuary, the walled garden. The sacred space protected from the outside world. Life (chayyim) begins with Cheth. The enclosed space in which new life gestates.",
med:"Create a small sanctuary \u2014 even just a chair, a candle, a moment of deliberate enclosure. Cheth teaches that sacred space must be bounded to be sacred.",
sv:"How amiable are thy tabernacles, O LORD of hosts! (Ps 84:1)"},
{l:"\u05d8",n:"Teth",v:9,t:"Serpent",cls:"Simple",el:"",pl:"",zo:"Leo",body:"Right kidney",num:19,
form:"The hidden good. Teth is the first letter of \u2018tov\u2019 (good) and is said to contain the primal divine light hidden at creation for the righteous. The serpent coiled around the central column \u2014 energy conserved, not yet released.",
med:"Where is the hidden good in your present difficulty? Teth requires looking beneath the surface form of events for the concealed goodness.",
sv:"Oh how great is thy goodness, which thou hast laid up for them that fear thee. (Ps 31:19)"},
{l:"\u05d9",n:"Yod",v:10,t:"Hand",cls:"Simple",el:"",pl:"",zo:"Virgo",body:"Left hand",num:20,
form:"The point of divine creative energy. Yod is the smallest letter and yet every other letter is built from it. The hand that creates. The first letter of YHVH. The seed-point from which all manifestation emerges.",
med:"Hold up one finger. The point of will. Every act of creation begins with this gesture of attention. Yod is the moment before the stroke.",
sv:"My hand also hath laid the foundation of the earth. (Isa 48:13)"},
{l:"\u05db",n:"Kaph",v:20,t:"Palm",cls:"Double",el:"",pl:"Sun",zo:"",body:"Left eye",num:21,
form:"The open palm \u2014 receiving and giving. The crown (keter) begins with Kaph. The vessel shaped to hold blessing. The throne of God is sometimes described as a great palm.",
med:"Open both palms upward. Kaph is the gesture of receptivity and surrender. Hold this posture in prayer for one full minute.",
sv:"Behold, I have graven thee upon the palms of my hands. (Isa 49:16)"},
{l:"\u05dc",n:"Lamed",v:30,t:"Ox goad",cls:"Simple",el:"",pl:"",zo:"Libra",body:"Left arm",num:22,
form:"The tallest letter, reaching above the others toward heaven. Learning, aspiration, the impulse upward. The heart (lev) begins with Lamed. The goad that drives toward purpose.",
med:"Sit tall. Lamed is the spine reaching upward. Feel the pull toward something higher. This is the letter of genuine learning \u2014 not accumulation but aspiration.",
sv:"The fear of the LORD is the beginning of wisdom: and the knowledge of the holy is understanding. (Prov 9:10)"},
{l:"\u05de",n:"Mem",v:40,t:"Water",cls:"Mother",el:"Water",pl:"",zo:"",body:"Belly / Womb",num:23,
form:"The primordial waters. Mem is silent in the middle of a word, like the depths of the sea. The womb of creation, the unconscious, the generative darkness before form. The Messiah comes from the waters.",
med:"Find a body of water or hold a cup. Mem is depth, silence, gestation. What is growing unseen in you? Trust the formless process.",
sv:"And the Spirit of God moved upon the face of the waters. (Gen 1:2)"},
{l:"\u05e0",n:"Nun",v:50,t:"Fish",cls:"Simple",el:"",pl:"",zo:"Scorpio",body:"Left kidney",num:24,
form:"The fish in the water of Mem \u2014 individual soul in the generative depths. Faithful continuity. Nun governs the soul\u2019s persistence through transformation, including the transformation of death.",
med:"The fish does not struggle against water \u2014 it moves through it. Where are you struggling against your element? Nun teaches faithful surrender to the medium of your life.",
sv:"The soul of every living thing is in the hand of God. (Job 12:10)"},
{l:"\u05e1",n:"Samekh",v:60,t:"Prop / Support",cls:"Simple",el:"",pl:"",zo:"Sagittarius",body:"Left foot",num:25,
form:"The circular letter of support and encirclement. God as the foundation beneath all things. The eternal cycle. Samekh also governs the secret things hidden in the heart.",
med:"Feel the floor beneath you. Samekh is support \u2014 the ground you did not make and do not sustain. Rest your full weight into it.",
sv:"The eternal God is thy refuge, and underneath are the everlasting arms. (Deut 33:27)"},
{l:"\u05e2",n:"Ayin",v:70,t:"Eye",cls:"Simple",el:"",pl:"",zo:"Capricorn",body:"Right ear",num:26,
form:"The eye of perception. Ayin governs sight in both its physical and spiritual modes \u2014 ordinary seeing and prophetic vision. The eye that sees God in all things. Also the source of the evil eye \u2014 perception that devours rather than receives.",
med:"Look at an ordinary object until you see it for the first time. Ayin teaches that seeing is an act of creation. You bring things into being by attending to them.",
sv:"Open thou mine eyes, that I may behold wondrous things out of thy law. (Ps 119:18)"},
{l:"\u05e4",n:"Pe",v:80,t:"Mouth",cls:"Double",el:"",pl:"Mercury",zo:"",body:"Left nostril",num:27,
form:"The mouth, speech, the power of language to create reality. God spoke the world into being. Pe carries both the open mouth of prayer and the closed mouth of discretion \u2014 the letter has two forms reflecting both.",
med:"Speak one true sentence aloud. Then sit in silence. Pe is the awareness of the power of your words. Speak less. Mean more.",
sv:"Death and life are in the power of the tongue. (Prov 18:21)"},
{l:"\u05e6",n:"Tzaddi",v:90,t:"Fish hook",cls:"Simple",el:"",pl:"",zo:"Aquarius",body:"Left arm",num:28,
form:"The righteous one (tzaddik) who draws souls upward as a fishhook draws fish from the depths. The bent posture of humility. The hidden tzaddik on whom the world stands.",
med:"Bow your head slightly. Tzaddi is the humility that precedes righteousness \u2014 not self-abasement but honest small-ness before what is genuinely great.",
sv:"The righteous shall flourish like the palm tree. (Ps 92:12)"},
{l:"\u05e7",n:"Qoph",v:100,t:"Back of head",cls:"Simple",el:"",pl:"",zo:"Pisces",body:"Left leg",num:29,
form:"The holiness that dwells at the back of consciousness, in the unconscious, in sleep, in the parts of the self not yet integrated. Qoph governs dreams and the threshold between the worlds.",
med:"Before sleep, be aware of the back of your head. Qoph governs what happens in you while you are not watching. Invite holiness into your sleeping hours.",
sv:"I will both lay me down in peace, and sleep: for thou, LORD, only makest me dwell in safety. (Ps 4:8)"},
{l:"\u05e8",n:"Resh",v:200,t:"Head",cls:"Double",el:"",pl:"Saturn",zo:"",body:"Left ear",num:30,
form:"The head, the face turned toward God and toward the world. Resh governs peace and strife \u2014 the choice of what your face turns toward determines whether you live in one or the other.",
med:"Turn your face. Resh is the choice of attention. What are you facing? What have you turned away from? The head chooses its direction.",
sv:"Seek peace, and pursue it. (Ps 34:14)"},
{l:"\u05e9",n:"Shin",v:300,t:"Tooth / Flame",cls:"Mother",el:"Fire",pl:"",zo:"",body:"Head / Breath",num:31,
form:"The consuming fire of divine presence. Shin has three heads corresponding to the three mother letters, the three columns of the Tree, and the three-fold fire of creation. The first letter of Shaddai and Shalom.",
med:"Light a candle. Watch the flame. Shin is the fire that does not burn what it illuminates \u2014 the fire of the burning bush, Moses\u2019 first encounter with the Name.",
sv:"For our God is a consuming fire. (Heb 12:29)"},
{l:"\u05ea",n:"Tav",v:400,t:"Cross / Mark",cls:"Double",el:"",pl:"Venus",zo:"",body:"Left kidney",num:32,
form:"The last letter, the seal on creation. The cross as the mark of completion. Emeth (truth) ends with Tav. The mark placed on the foreheads of those who mourn in Ezekiel. The final word is truth.",
med:"Draw a cross or the letter. Tav is the signature of God on creation \u2014 the mark that the work is complete. Every ending carries this seal.",
sv:"I am Alpha and Omega, the beginning and the end. (Rev 1:8)"}
];

const COLOUR_SCALES=[

pr:{c:"#E8E8E8",t:"White Brilliance (tinged gold)",d:"In Yetzirah, Kether\u2019s light begins to carry the faintest warmth of the Ain Soph Aur, the limitless light, as it approaches form."},

{n:2,name:"Chokmah",

q:{c:"#C8C8FF",t:"Grey",d:"Chokmah in Beriah is grey \u2014 the wisdom before it declares itself, the undifferentiated potential of the archangelic level containing all colours in germ."},
pr:{c:"#F0E0C0",t:"Pearlescent grey",d:"In Yetzirah the Father principle becomes iridescent \u2014 pearl, the grey that is also all colours, the shimmer of potential on the verge of declaration."},
ps:{c:"#FFFFFF",t:"White flecked red, blue, yellow",d:"In Assiah, Chokmah\u2019s wisdom scatters into the three primary colours \u2014 the full spectrum latent in pure light, now beginning to differentiate into creation\u2019s palette."}},
{n:3,name:"Binah",
k:{c:"#111133",t:"Crimson",d:"The Great Mother\u2019s colour in Atziluth is the deepest crimson \u2014 the colour of blood and of the first light of dawn. Life-force and limitation. The womb and the wound are one."},
q:{c:"#000011",t:"Black",d:"Binah in Beriah is absolute black \u2014 the archangelic experience of the great understanding is darkness, not blindness. It is the darkness that contains everything."},

ps:{c:"#888866",t:"Grey flecked pink",d:"In Assiah, understanding manifests as the grey of stone with flecks of rose \u2014 the physical world\u2019s version of the divine mother: matter that hints at the life it contains."}},
{n:4,name:"Chesed",

pr:{c:"#88CCFF",t:"Deep purple",d:"In Yetzirah, mercy\u2019s blue deepens toward the colour of the sea at depth \u2014 the purple-blue of generosity that is not shallow but has fathoms."},
ps:{c:"#AACCFF",t:"Deep azure flecked yellow",d:"In Assiah, Chesed\u2019s mercy arrives as the sky blue of a clear day with the warmth of sunlight in it \u2014 the experienced sense of grace on a fine morning."}},
{n:5,name:"Geburah",
k:{c:"#DC3545",t:"Orange-scarlet",d:"Severity\u2019s colour in Atziluth is the orange-scarlet of Mars at rising \u2014 the war-standard, the hot metal, the colour of decisive action and purifying anger."},
q:{c:"#CC2233",t:"Red",d:"In Beriah, severity becomes pure red \u2014 the archangel Kamael\u2019s colour, the warrior\u2019s standard. Not cruelty but the clean red of righteous force."},
pr:{c:"#FF6644",t:"Bright scarlet",d:"In Yetzirah, the red brightens to scarlet \u2014 the angelic Seraphim burning with divine love. Their fire is not pain but the intensity of absolute honesty."},
ps:{c:"#CC4444",t:"Red flecked black",d:"In Assiah, severity manifests as blood-red flecked with black \u2014 the colour of dried blood, iron rust, autumn leaves. Decay and death as natural severities."}},
{n:6,name:"Tiphareth",
k:{c:"#FFD700",t:"Clear pink rose",d:"Beauty\u2019s divine colour is the rose of the sacred heart \u2014 pure, warm, the colour of love and of dawn. The Christ-light before it was divided by the prism of the lower Tree."},
q:{c:"#FFA500",t:"Yellow",d:"In Beriah, Tiphareth becomes clear yellow \u2014 the archangels of the centre working in the golden light of healing and reconciliation. The colour of awakened intelligence."},
pr:{c:"#FFDD44",t:"Rich salmon pink",d:"In Yetzirah, the yellow warms toward amber gold \u2014 the Malachim, the kings, governing beauty in the formative world. Every natural golden thing reflects this level."},
ps:{c:"#CC9900",t:"Golden amber",d:"In Assiah, Tiphareth is the gold of the physical Sun \u2014 amber, honey, autumn light, the actual experience of warmth and illumination. The heart-warmth of a good day."}},
{n:7,name:"Netzach",
k:{c:"#E87BA8",t:"Amber",d:"Victory\u2019s divine colour is amber \u2014 the golden-orange of desire and creativity at their highest. Warm, luminous, carrying both fire and sweetness."},
q:{c:"#55AA55",t:"Emerald",d:"In Beriah, Netzach becomes the emerald green of living nature \u2014 Haniel\u2019s grace, Venus\u2019s fertility. The colour of the Garden before the fall, when nature was entirely transparent to God."},
pr:{c:"#88BB44",t:"Bright yellowish green",d:"In Yetzirah, the emerald brightens to the yellow-green of new leaves in spring \u2014 the elemental intelligences at work in the growth impulse of all living things."},
ps:{c:"#AA7744",t:"Olive flecked gold",d:"In Assiah, desire and nature manifest as the olive of ripe fruit, of the earth in summer \u2014 gold-green, the colour of abundance nearly at its peak."}},
{n:8,name:"Hod",
k:{c:"#9B7BDB",t:"Violet-purple",d:"Splendour\u2019s divine colour is violet \u2014 Mercury\u2019s colour at its highest, the intellect on the threshold of intuition. The last colour before the invisible ultraviolet."},
q:{c:"#FF8800",t:"Orange",d:"In Beriah, Hod becomes the orange of Mercury\u2019s brilliant quicksilver mind \u2014 the archangel Raphael\u2019s healing intelligence. Orange is thought made warm and active."},
pr:{c:"#FFAA55",t:"Red-russet",d:"In Yetzirah, the orange darkens toward rust and red \u2014 the angelic Beni Elohim, who are the thoughts of God in formative expression, shaping the world through language and number."},
ps:{c:"#DDAA44",t:"Yellowish brown flecked white",d:"In Assiah, intellect manifests as the yellowish-brown of parchment and old wood \u2014 the colour of books and manuscripts, the physical carriers of written language."}},
{n:9,name:"Yesod",
k:{c:"#B8C6D4",t:"Indigo",d:"Foundation\u2019s divine colour is indigo \u2014 the deep blue of the night sky just after twilight, the colour of depth and mystery, the threshold between the visible and the invisible."},
q:{c:"#7090A4",t:"Violet",d:"In Beriah, Yesod becomes violet \u2014 Gabriel\u2019s colour, the archangel of the Moon and dreams. Violet is the colour of the threshold between waking and sleeping consciousness."},
pr:{c:"#AABBCC",t:"Very dark purple",d:"In Yetzirah, the violet deepens to dark purple \u2014 the colour of the astral world at its most active, the dream-state\u2019s deep symbols moving through the formative realm."},
ps:{c:"#DDDDEE",t:"Citrine flecked azure",d:"In Assiah, foundation manifests as the pale silver-blue of moonlight \u2014 the actual experience of lunar light on water or stone, cool and reflective and alive."}},
{n:10,name:"Malkuth",
k:{c:"#8B6D3F",t:"Yellow (earthy)",d:"Kingdom\u2019s divine colour is the warm yellow of sunlit earth \u2014 the divine presence as it meets the material world, the immanent God experienced in physical reality."},
q:{c:"#5B3D0F",t:"Citrine, olive, russet, black",d:"In Beriah, Malkuth\u2019s four earthy colours appear: citrine (Air of Earth), olive (Water of Earth), russet (Fire of Earth), and black (Earth of Earth). The full earthly spectrum."},
pr:{c:"#8B6D3F",t:"Citrine, olive, russet, black (rayed gold)",d:"In Yetzirah, the same four colours are shot through with rays of gold \u2014 the earthly principle beginning to reveal its divine substrate. Matter as a text in which God can be read."},
ps:{c:"#5B3D0F",t:"Black rayed yellow",d:"In Assiah, the Kingdom is black (the density of matter) rayed with yellow-gold (the divine light that pervades it). Every dark thing contains divine radiance. The world is God\u2019s body."}}
];

let _lastHourKey='';let _lastVOC=false;
function checkNotifications(now){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const pd=pHours(now,CFG.lat);
  const ch=pd.hours.find(h=>now>=h.start&&now<h.end)||pd.hours[0];
  const hk=ch.ruler+ch.start.getTime();
  if(CFG.notifyHour&&hk!==_lastHourKey){
    _lastHourKey=hk;
    try{new Notification('Liber Temporis',{body:`${ch.ruler} hour begins · ${fmt(ch.start)}–${fmt(ch.end)}`,icon:'./icon-192.png'});}catch(e){}
  }
  const voc=vocMoon(now);
  if(CFG.notifyVOC&&voc.isVOC&&!_lastVOC){
    _lastVOC=true;
    try{new Notification('Liber Temporis',{body:`Moon void of course · entering ${voc.nextSign} in ${voc.hoursToIngress}h`,icon:'./icon-192.png'});}catch(e){}
  }
  if(!voc.isVOC)_lastVOC=false;
}
async function requestNotifPermission(){
  if(!('Notification' in window))return alert('Notifications not supported on this device.');

}

}

function vocMoon(dt){
  const ms=mSign(dt);
  const degInSign=ms.lon%30;
  const degsLeft=30-degInSign;
  const hoursToIngress=Math.round((degsLeft/0.5)*10)/10;
  const ingress=new Date(dt.getTime()+(degsLeft/0.5)*3600000);
  const isVOC=degsLeft<=2;
  const nextSign=ZS[(ZS.indexOf(ms.sign)+1)%12];
  return{isVOC,degsLeft:degsLeft.toFixed(1),ingress,nextSign,curSign:ms.sign,hoursToIngress:hoursToIngress.toFixed(1)};
}

const dayLen=SS-SR;

{nm:"Matins",sym:"✶",t:new Date(now.toDateString()+' 00:00:00'),note:"Midnight office. Deepest silence. Vigil before dawn.",col:"#3a3a6a"},

{nm:"Prime",sym:"◈",t:new Date(SR.getTime()+dayLen/6),note:"First hour. Consecration of the day's intent.",col:"#d4a020"},
{nm:"Terce",sym:"△",t:new Date(SR.getTime()+dayLen/3),note:"Third hour. The Paraclete descends. Active work begins.",col:"#c44520"},
{nm:"Sext",sym:"☉",t:new Date(SR.getTime()+dayLen/2),note:"Solar noon. Silence and brief examination.",col:"#D4A020"},
{nm:"None",sym:"▽",t:new Date(SR.getTime()+2*dayLen/3),note:"Ninth hour. Hour of the Passion. Contemplative slowdown.",col:"#9B7BDB"},
{nm:"Vespers",sym:"☀",t:SS,note:"Sunset office. The light departs. Evening thanksgiving.",col:"#b89a42"},

];

const nextHr=pd.hours[pd.hours.indexOf(curHr)+1]||null;

for(let hr=1;hr<=168&&ingresses.length<4;hr++){

{nm:'Algol',lat:'Caput Algol',lon:26.4,si:'Taurus',nat:'Saturn · Jupiter',stone:'Diamond',herb:'Hellebore, Mugwort',op:'Protection from evil, overcoming enemies, success in petitions',ds:'The Demon Star — the severed head of Medusa in Perseus. The most malefic fixed star; yet under proper constraint, its power to freeze and paralyse evil makes it the supreme protective force. Agrippa: "It bestows boldness and magnamimity."',ckab:'The head of Goliath held by David. Evil constrained and displayed as trophy. Under YHShVH, Algol\'s paralysing force is turned against the adversary. Christ descended into hell and bound the strong man (Matt 12:29).',col:'#666688',script:''},
{nm:'Pleiades',lat:'Alcyone',lon:0.3,si:'Gemini',nat:'Moon · Mars',stone:'Rock Crystal',herb:'Fennel, Diacedon',op:'Enhancing sight (physical and spiritual), invoking lunar spirits, curing blindness',ds:'The Seven Sisters — the most famous star cluster, visible to the naked eye as a luminous knot. Anciently associated with weeping (the name may derive from the Greek for "to sail" or "to weep"). Their rising marked planting season across cultures.',ckab:'"Canst thou bind the sweet influences of Pleiades?" (Job 38:31). God challenges Job with the stars themselves. The Pleiades are the seven churches of Revelation, the seven spirits before the throne — stellar sevenfold grace.',col:'#B8C6D4',script:'Job 38:31'},

{nm:'Regulus',lat:'Cor Leonis',lon:0.2,si:'Virgo',nat:'Jupiter · Mars',stone:'Granite',herb:'Mugwort, Celandine',op:'Tempering passions, bestowing royal dignity, banishing melancholy, granting favour',ds:'The Heart of the Lion — another Royal Star (Watcher of the North). Regulus is the star of kings: it grants and removes sovereignty. In astrological tradition, whatever it touches it elevates — but Regulus exalted demands Regulus-level integrity.',ckab:'The Lion of the Tribe of Judah (Rev 5:5) — Christ as the true King whose sovereignty Regulus reflects. The Heart of the Lion is the Sacred Heart: Tiphareth as cosmic royalty incarnate in the suffering heart of God.',col:'#FFD700',script:'Rev 5:5'},

{nm:'Arcturus',lat:'Alpha Boötis',lon:24.5,si:'Libra',nat:'Mars · Jupiter',stone:'Jasper',herb:'Plantain',op:'Prosperity, healing fevers, driving away malefic influence, safe journeying',ds:'The Bear-Keeper — the brightest star in the northern sky. Arcturus guards the circumpolar region, the axis around which the heavens turn. A beneficent warrior-star whose nature combines Martian protection with Jupiterian expansion.',ckab:'"Canst thou guide Arcturus with his sons?" (Job 38:32). God names Arcturus as a force He alone governs. The Bear-Keeper is the Good Shepherd (John 10:11), guiding the flock (the circumpolar stars) through the night.',col:'#E87BA8',script:'Job 38:32'},
{nm:'Alphecca',lat:'Gemma Coronae',lon:12.5,si:'Scorpio',nat:'Venus · Mars',stone:'Topaz',herb:'Rosemary',op:'Love, honour, chastity, dissolving enchantments',ds:'The Gem of the Crown — the brightest star in Corona Borealis (the Northern Crown). The crown laid down by Ariadne, discovered by Bacchus. A star of noble love that crowns rather than consumes. Venus and Mars in harmony.',ckab:'The crown of thorns transfigured into the crown of glory (1 Pet 5:4). Alphecca is the promise that what was given in suffering will be returned in beauty. The Virgin\'s crown of twelve stars (Rev 12:1).',col:'#9B7BDB',script:'Rev 12:1'},

function nearbyStars(moonLon,orb){const SS={Aries:0,Taurus:30,Gemini:60,Cancer:90,Leo:120,Virgo:150,Libra:180,Scorpio:210,Sagittarius:240,Capricorn:270,Aquarius:300,Pisces:330};return BEHENIAN.filter(s=>{const absLon=(SS[s.si]||0)+s.lon;const d=Math.abs(((moonLon-absLon)%360+540)%360-180);return d<=orb;}).map(s=>{const absLon=(SS[s.si]||0)+s.lon;const d=Math.abs(((moonLon-absLon)%360+540)%360-180);return{...s,dist:d,absLon};}).sort((a,b)=>a.dist-b.dist);}

function accessScore(pl,si){
  const now=new Date();
  const pd=pHours(now,S.lat);
  const ms=mSign(now);
  const ch=pd.hours.find(h=>now>=h.start&&now<h.end)||pd.hours[0];
  const dayRuler=pd.dayRuler;
  let score=0;
  // Planetary hour match — primary signal
  if(ch.ruler===pl)score+=3;
  // Day ruler match — secondary
  if(dayRuler===pl)score+=2;
  // Moon sign element affinity
  const moonEl=ms.el;
  const plEl={Sun:'Fire',Moon:'Water',Mars:'Fire',Mercury:'Air',Jupiter:'Fire',Venus:'Earth',Saturn:'Earth'};
  if(plEl[pl]===moonEl)score+=1;
  // Moon sign direct match (sign affinity stored per spirit)
  if(si&&ms.sign===si)score+=2;
  return score;
}
function accessBadge(pl,si){
  const sc=accessScore(pl,si);
  if(sc>=5)return`<div style="display:flex;align-items:center;gap:3px"><div style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade8088;flex-shrink:0"></div><div style="font-size:8px;color:#4ade80;letter-spacing:1px" class="cin">ACTIVE</div></div>`;
  if(sc>=3)return`<div style="display:flex;align-items:center;gap:3px"><div style="width:7px;height:7px;border-radius:50%;background:#b89a42;box-shadow:0 0 6px #b89a4266;flex-shrink:0"></div><div style="font-size:8px;color:#b89a42;letter-spacing:1px" class="cin">ALIGNED</div></div>`;
  return'';
}

// ── Ein Sof / veils detail
const EIN_SOF_DATA={
ain:{
