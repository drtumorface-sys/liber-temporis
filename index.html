<style>

:root{--bg:#07070c;--srf:#0e0e18;--card:#151520;--brd:#242438;--gold:#b89a42;--goldD:#7a6830;--silver:#8a96a8;--text:#ccccd8;--dim:#606078}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--goldD);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 6px #b89a4222}50%{box-shadow:0 0 16px #b89a4244}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.85}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fu{animation:fadeUp .4s ease both}
.cin{font-family:'Cinzel',serif}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--brd);margin-bottom:10px}
.label{font-size:10px;letter-spacing:3px;color:var(--dim);font-family:'Cinzel',serif;text-transform:uppercase}
.title{font-size:11px;letter-spacing:3px;color:var(--gold);font-family:'Cinzel',serif;text-transform:uppercase;margin-bottom:8px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.back{background:none;border:1px solid var(--brd);color:var(--dim);padding:5px 12px;border-radius:8px;cursor:pointer;font-family:'EB Garamond',serif;font-size:13px;margin-bottom:12px}
input[type=text],input[type=date],select{width:100%;padding:8px 12px;border-radius:10px;background:var(--card);border:1px solid var(--brd);color:var(--text);font-size:14px;font-family:'EB Garamond',serif;outline:none;margin-bottom:8px}
.pill{padding:3px 9px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Cinzel',serif;border:1px solid var(--brd);background:var(--card);color:var(--dim);display:inline-block;margin:2px}
.pill.on{border-color:var(--gold);color:var(--gold);background:#b89a4218}
.row{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;margin-bottom:4px;display:flex;align-items:center;gap:10px;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:10;background:#07070cee;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--brd);display:flex;justify-content:center;padding:6px 0 max(8px,env(safe-area-inset-bottom))}
.nav-i{display:flex;gap:0;max-width:520px;width:100%}
.nav button{flex:1;background:none;border:none;cursor:pointer;padding:4px 0;text-align:center;color:var(--dim);transition:color .2s}
.nav button.on{color:var(--gold)}
.nav .ic{font-size:15px;margin-bottom:1px}
.nav .lb{font-size:7px;font-family:'Cinzel',serif;letter-spacing:1px;text-transform:uppercase}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 12px 100px}
.section{margin-top:14px}
.dot{color:var(--gold);font-size:8px;margin-right:6px}
.wline{font-size:14px;padding:3px 0;display:flex;align-items:center}
.hemi-bar{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
</style>

function findEl(cat,lat,now){const r=[];for(let d=0;d<7;d++){const dt=new Date(now.getTime()+d*864e5),{hours}=pHours(dt,lat),ms_=mSign(dt),mp_=mPhase(dt),mn_=gMn(ms_.lon),wx=mp_.wax;for(const h of hours){if(!cat.pl.includes(h.ruler))continue;let sc=40;const re=[h.ruler+" hr"];if(cat.ms.includes(ms_.sign)){sc+=25;re.push("☽ "+ms_.sign)}if(cat.mn.includes(mn_.n)){sc+=20;re.push("Mansion "+mn_.n)}if(cat.wx===null||cat.wx===wx){sc+=15;re.push(wx?"Waxing":"Waning")}if(DR[dt.getDay()]===h.ruler){sc+=10;re.push("Day of "+h.ruler)}r.push({dt,h,sc,re,mp:mp_.name,ms:ms_.sign})}}return r.sort((a,b)=>b.sc-a.sc).slice(0,20)}

n.innerHTML=tabs.map(t=>`<button class="${S.tab===t.id?'on':''}" onclick="S.tab='${t.id}';S.detail=null;S.mansion=null;render()"><div class="ic">${t.i}</div><div class="lb">${t.l}</div></button>`).join('')}

function render(){
const app=document.getElementById('app'),now=new Date();
const lat=S.lat,pd=pHours(now,lat),mp=mPhase(now),ms=mSign(now),mn=gMn(ms.lon),ss=sSign(now);
const ch=pd.hours.find(h=>now>=h.start&&now<h.end)||pd.hours[0];
renderNav();
let html=`<div style="text-align:center;padding:22px 0 12px">
<div style="font-size:9px;letter-spacing:7px;color:#7a6830" class="cin">LIBER TEMPORIS</div>
<div class="cin" style="font-size:20px;color:#b89a42;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,#7a6830,#b89a42,#7a6830);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 6s linear infinite">☉ Fourth Book Grimoire ☽</div>
<div style="font-size:11px;color:#606078;margin-top:2px">${fmtD(now)} · ${fmt(now)} · ${S.southern?'Southern':'Northern'} Hemisphere</div></div>`;

if(S.tab==='now') html+=renderNow(now,pd,mp,ms,mn,ss,ch);
else if(S.tab==='hours') html+=renderHours(now,pd);
else if(S.tab==='moon') html+=renderMoon(mp,ms,mn);
else if(S.tab==='beings') html+=renderBeings(ch);
else if(S.tab==='elect') html+=renderElect(now);
else if(S.tab==='project') html+=renderProject(now);
else if(S.tab==='ref') html+=renderRef();
app.innerHTML=html;
}

<div class="card" style="border-radius:16px;padding:22px;text-align:center;border-color:${col}44;background:linear-gradient(135deg,#151520,#0e0e18);box-shadow:0 0 24px ${col}10">
${label('Current Planetary Hour')}
<div style="font-size:44px;margin:4px 0;color:${col}">${p.sym}</div>

${pd.hours.map((h,i)=>{const cur=now>=h.start&&now<h.end,col=pc(h.ruler);
return`<div style="background:${cur?`linear-gradient(90deg,${col}10,#151520)`:'#151520'};border:1px solid ${cur?col+'44':'#242438'};border-radius:10px;padding:8px 12px;margin-bottom:4px;display:flex;align-items:center;gap:10px;opacity:${now>h.end?.3:1};${cur?'animation:glow 3s ease-in-out infinite':''}">

<div style="flex:1"><div class="cin" style="font-size:13px;color:${cur?col:'#ccccd8'};font-weight:${cur?600:400}">${h.ruler}${cur?` <span style="font-size:8px;background:${col}28;padding:1px 6px;border-radius:10px;margin-left:6px">NOW</span>`:''}</div>

function renderBeings(ch){

let h=`<div class="fu"><div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">`;
cats.forEach(c=>{h+=`<button class="pill ${S.detailType===c.id?'on':''}" onclick="S.detailType='${c.id}';S.filter='';S.planetF='All';render()">${c.l} (${c.n})</button>`});
h+='</div>';
const dt=S.detailType||'goetia';
if(dt==='goetia'){
h+=`<input type="text" placeholder="Search name or power..." value="${S.filter}" oninput="S.filter=this.value;render()">`;
h+=`<div style="display:flex;gap:2px;flex-wrap:wrap;margin-bottom:8px">`;
["All",...Object.keys(PD)].forEach(p=>{const on=S.planetF===p,col=p==="All"?"#b89a42":pc(p);h+=`<button class="pill ${on?'on':''}" style="${on?`border-color:${col}40;color:${col};background:${col}18`:''}" onclick="S.planetF='${p}';render()">${p==="All"?"All":PD[p].sym}</button>`});
h+='</div>';
const q=S.filter.toLowerCase();
G.filter(s=>(!q||s.nm.toLowerCase().includes(q)||s.pw.toLowerCase().includes(q))&&(S.planetF==="All"||s.pl===S.planetF)).forEach(s=>{
h+=`<div class="row" onclick="S.detail=${s.n};S.detailType='goetia';render()"><div class="cin" style="font-size:15px;color:${pc(s.pl)};width:26px;text-align:center">${s.n}</div><div style="flex:1"><div class="cin" style="font-size:13px">${s.nm} <span style="font-size:10px;color:#606078">· ${s.rk}</span></div><div style="font-size:11px;color:#606078">${s.pw}</div></div><div style="text-align:right"><div style="font-size:14px;color:${pc(s.pl)}">${PD[s.pl].sym}</div><div style="font-size:10px;color:#606078">${s.lg}L</div></div></div>`});
}else if(dt==='olympic'){
OL.forEach(s=>{h+=`<div class="row" onclick="S.detail='${s.nm}';S.detailType='olympic';render()"><div style="font-size:20px;color:${pc(s.pl)};width:30px;text-align:center">${PD[s.pl].sym}</div><div style="flex:1"><div class="cin" style="font-size:14px;color:${pc(s.pl)}">${s.nm}</div><div style="font-size:11px;color:#606078">${s.gov}</div></div><div style="font-size:10px;color:#606078">${s.ru}</div></div>`});
}else if(dt==='angels'){
Object.entries(PA).forEach(([nm,a])=>{h+=`<div class="row" onclick="S.detail='${nm}';S.detailType='angels';render()"><div style="font-size:20px;color:${pc(a.pl)};width:30px;text-align:center">${PD[a.pl].sym}</div><div style="flex:1"><div class="cin" style="font-size:14px;color:${pc(a.pl)}">${nm}</div><div style="font-size:11px;color:#606078">${a.ord} · ${a.dir}</div></div></div>`});
}else if(dt==='elemental'){
ELS.forEach(s=>{const ei=s.el==="Fire"?"🔥":s.el==="Air"?"💨":s.el==="Water"?"🌊":"🌿";
h+=`<div class="row" onclick="S.detail='${s.nm}';S.detailType='elemental';render()"><div style="font-size:20px;width:30px;text-align:center">${ei}</div><div style="flex:1"><div class="cin" style="font-size:14px;color:${s.c}">${s.nm}</div><div style="font-size:11px;color:#606078">${s.el} · Ruler: ${s.ruler}</div></div></div>`});
}else if(dt==='kings'){
CK.forEach(s=>{const ar=s.dir==="East"?"→":s.dir==="South"?"↓":s.dir==="West"?"←":"↑";
h+=`<div class="row" onclick="S.detail='${s.nm}';S.detailType='kings';render()"><div style="font-size:18px;color:${s.c};width:30px;text-align:center">${ar}</div><div style="flex:1"><div class="cin" style="font-size:14px;color:${s.c}">${s.nm}</div><div style="font-size:11px;color:#606078">${s.dir} · ${s.el}</div></div></div>`});
}else if(dt==='orders'){
AO.forEach(s=>{h+=`<div class="row" onclick="S.detail='${s.nm}';S.detailType='orders';render()"><div class="cin" style="font-size:16px;color:${s.c};width:26px;text-align:center">${s.rk}</div><div style="flex:1"><div class="cin" style="font-size:14px;color:${s.c}">${s.nm}</div><div style="font-size:11px;color:#606078">${s.vt}</div></div></div>`});
}
h+='</div>';return h}

<div style="margin-top:14px;padding:14px;background:#07070c88;border-radius:10px;border:1px solid ${col}18">${title('Approaching Without Circle',col)}<div style="font-size:13px;color:#8a96a8;line-height:1.7">${s.inf}</div></div></div>`}
else if(dt==='orders'){s=AO.find(x=>x.nm===S.detail);col=s.c;
h+=`<div class="card" style="padding:20px;border-radius:16px;border-color:${col}30;background:linear-gradient(135deg,#151520,${col}06)"><div style="text-align:center">
<div class="cin" style="font-size:12px;color:#606078">Order ${s.rk} of 9</div>
<div class="cin" style="font-size:24px;color:${col};font-weight:700">${s.nm}</div>
<div style="display:flex;justify-content:center;gap:5px;margin-top:6px;flex-wrap:wrap">${tag(s.sp,col)}${tag(s.vt,'#8a96a8')}</div></div>
<div style="margin-top:14px;font-size:14px;color:#8a96a8;line-height:1.7">${s.ds}</div>
<div style="margin-top:10px;font-size:13px;color:#8a96a8"><div style="border-bottom:1px solid #24243818;padding:5px 0">Chief: ${s.ch}</div><div style="border-bottom:1px solid #24243818;padding:5px 0">${s.kb}</div><div style="padding:5px 0">Operations: ${s.ops}</div></div>
<div class="section">${title('Ritual Objects',col)}<div style="display:flex;flex-wrap:wrap;gap:4px">${s.obj.map(o=>tag(o,col)).join('')}</div></div>
<div style="margin-top:14px;padding:14px;background:#07070c88;border-radius:10px;border:1px solid ${col}18">${title('Approaching Without Preparation',col)}<div style="font-size:13px;color:#8a96a8;line-height:1.7">${s.inf}</div></div></div>`}
h+='</div>';return h}

function renderElect(now){
let h=`<div class="fu">${title('Choose Working')}
<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">`;
ECATS.forEach(c=>{const on=S.elCat&&S.elCat.id===c.id;
h+=`<div onclick="S.elCat=ECATS.find(x=>x.id==='${c.id}');render()" style="background:${on?'#b89a4210':'#151520'};border:1px solid ${on?'#b89a4244':'#242438'};border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center">
<div style="font-size:20px">${c.i}</div><div class="cin" style="font-size:11px;color:${on?'#b89a42':'#ccccd8'};margin-top:2px">${c.l}</div></div>`});
h+='</div>';
if(S.elCat){const els=findEl(S.elCat,S.lat,now);
if(els.length){h+=title('Best Times — 7 Days');
els.forEach(e=>{h+=`<div class="card" style="padding:8px 12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="cin" style="font-size:12px">${fmtD(e.dt)} · ${fmt(e.h.start)}</div><div style="font-size:11px;color:#606078">${e.mp} · ${e.ms}</div></div><div class="cin" style="font-size:16px;font-weight:700;color:${e.sc>=80?'#4ade80':e.sc>=60?'#b89a42':'#606078'}">${e.sc}</div></div>
<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">${e.re.map(r=>`<span style="font-size:9px;padding:1px 5px;border-radius:5px;background:#b89a420c;color:#7a6830">${r}</span>`).join('')}</div></div>`})}}
h+='</div>';return h}

function renderProject(now){
let h=`<div class="fu">${title('Future Astrological Conditions')}
<div class="card"><div style="font-size:13px;color:#606078;margin-bottom:8px">Select a date to project planetary hours, moon phase, sign, mansion, and sun sign. Calculations use ${S.southern?'Southern':'Northern'} Hemisphere.</div>
<input type="date" value="${S.projDate}" onchange="S.projDate=this.value;render()"></div>`;
if(S.projDate){const d=new Date(S.projDate+'T12:00:00');if(!isNaN(d)){
const pH=pHours(d,S.lat),pM=mPhase(d),pMs=mSign(d),pMn=gMn(pMs.lon),pSs=sSign(d);
h+=`<div class="card" style="text-align:center;border-color:#b89a4230"><div class="cin" style="font-size:16px;color:#b89a42">${fmtD(d)}</div><div style="font-size:13px;color:#606078">Day of ${pH.dayRuler} · ${PD[pH.dayRuler].sym}</div></div>
<div class="grid2">
<div class="card">${label('Moon Phase')}<div style="font-size:28px;margin-top:3px">${mIcon(pM,S.southern)}</div><div class="cin" style="font-size:12px">${pM.name}</div><div style="font-size:11px;color:#606078">${pM.ill}% · ${pM.wax?'Waxing':'Waning'}</div></div>
<div class="card">${label('Moon Sign')}<div style="font-size:28px;color:${EC[pMs.el]};margin-top:3px">${pMs.sym}</div><div class="cin" style="font-size:12px">${pMs.sign} ${pMs.deg}°</div></div>
<div class="card">${label('Sun Sign')}<div style="font-size:28px;color:${EC[pSs.el]};margin-top:3px">${pSs.sym}</div><div class="cin" style="font-size:12px">${pSs.sign} ${pSs.deg}°</div></div>
<div class="card">${label('Mansion')}<div class="cin" style="font-size:14px;color:#b89a42;margin-top:3px">${pMn.n}. ${pMn.nm}</div><div style="font-size:11px;color:#606078">${pMn.p}</div></div></div>`;
h+=`<div class="card">${title('Planetary Hours')}
<div style="font-size:12px;color:#606078;margin-bottom:6px">☉ ${fmt(pH.sunrise)} · ☽ ${fmt(pH.sunset)}</div>
${pH.hours.map(hr=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #24243814">
<div style="font-size:14px;color:${pc(hr.ruler)};width:22px;text-align:center">${PD[hr.ruler].sym}</div>
<div style="flex:1;font-size:12px"><span class="cin" style="color:${pc(hr.ruler)}">${hr.ruler}</span> <span style="color:#606078">· ${HA[hr.ruler]}</span></div>
<div style="font-size:11px;color:#606078">${fmt(hr.start)}–${fmt(hr.end)}</div>
<div style="font-size:10px;color:#606078">${hr.isDay?'☀':'☾'}</div></div>`).join('')}</div>`;
h+=`<div class="card">${title('Favorable Workings')}
<div style="font-size:13px;color:#606078;margin-bottom:6px">Day of ${pH.dayRuler} · Moon in ${pMs.sign} · Mansion ${pMn.n}</div>
${PD[pH.dayRuler].works.map(w=>`<div class="wline">${dot(pc(pH.dayRuler))}${w}</div>`).join('')}
<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:3px">${pMn.g.map(g=>tag(g)).join('')}</div></div>`;
h+=title('7-Day Overview');
for(let i=0;i<7;i++){const dd=new Date(d.getTime()+i*864e5),dM=mPhase(dd),dMs=mSign(dd),dMn=gMn(dMs.lon),dR=DR[dd.getDay()];
h+=`<div class="row" style="cursor:default"><div style="font-size:12px;width:22px;text-align:center">${mIcon(dM,S.southern)}</div><div style="flex:1"><div class="cin" style="font-size:12px">${fmtD(dd)} · <span style="color:${pc(dR)}">${dR}</span></div><div style="font-size:10px;color:#606078">${dMs.sym} ${dMs.sign} · Mansion ${dMn.n} · ${dM.name}</div></div></div>`}
}}
h+='</div>';return h}

function renderRef(){
const p=PD[S.refP],col=p.c;
let h=`<div class="fu"><div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">`;
Object.keys(PD).forEach(pl=>{const on=S.refP===pl;h+=`<button class="pill ${on?'on':''}" style="${on?`border-color:${pc(pl)}44;color:${pc(pl)};background:${pc(pl)}16`:''}" onclick="S.refP='${pl}';render()">${PD[pl].sym}</button>`});
h+=`</div><div class="card" style="padding:20px;border-radius:16px;border-color:${col}30;background:linear-gradient(135deg,#151520,${col}06)">
<div style="text-align:center"><div style="font-size:44px;color:${col}">${p.sym}</div><div class="cin" style="font-size:24px;color:${col};font-weight:700">${S.refP}</div></div>
<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:5px">`;
[["Day",p.day],["Metal",p.metal],["Candle",p.candle],["Cloth",p.cloth],["Stone",p.stone],["Colors",p.colors],["Angel",p.angel],["Intelligence",p.intel],["Spirit",p.spirit],["Number",p.num],["Square",p.sq]].forEach(([k,v])=>{
h+=`<div style="padding:4px 0;border-bottom:1px solid #24243818"><div style="font-size:9px;color:#606078;text-transform:uppercase;letter-spacing:1px">${k}</div><div style="font-size:12px;margin-top:1px">${v}</div></div>`});
h+=`</div>
<div class="section">${title('Suffumigation',col)}<div style="font-size:13px;color:#606078">${p.suf}</div></div>
<div class="section">${title('Animals',col)}<div style="font-size:13px;color:#606078">${p.animals}</div></div>
<div class="section">${title('Plants',col)}<div style="font-size:13px;color:#606078">${p.plants}</div></div>
<div class="section">${title('Ritual Objects',col)}<div style="display:flex;flex-wrap:wrap;gap:3px">${p.obj.map(o=>tag(o,col)).join('')}</div></div>
<div class="section">${title('Works',col)}${p.works.map(w=>`<div class="wline">${dot(col)}${w}</div>`).join('')}</div>
<div style="margin-top:14px;padding:12px;background:#07070c66;border-radius:10px;border:1px solid ${col}14">${title('Informal Approach',col)}<div style="font-size:13px;color:#8a96a8;line-height:1.7">${p.approach}</div></div></div></div>`;
return h}

// ═══ INIT ═══
renderStars();
S.detailType='goetia';
render();
setInterval(render,30000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
