{n:3,nm:"Vassago",rk:"Prince",pl:"Jupiter",si:"Aries",lg:26,pw:"Divination, lost things",ds:"Good nature. Hidden treasures.",tr:2,phil:"Called 'of good nature' in the Lemegeton, Vassago embodies Jupiter's expansive generosity applied to prophetic vision. His office of restoring what is lost — materially and spiritually — aligns with Chesed as the divine flow that replenishes what scarcity has taken."},
{n:4,nm:"Samigina",rk:"Marquis",pl:"Mercury",si:"Aries",lg:30,pw:"Sciences, necromancy",ds:"Appears as horse. Speaks with dead.",tr:3,phil:"His office places him at the threshold between Yesod's astral memory and Malkuth's domain of death. The horse-form signals the subconscious interface through which the dead still communicate; Mercury governs the passage of that communication between planes."},
{n:5,nm:"Marbas",rk:"President",pl:"Mars",si:"Aries",lg:36,pw:"Disease, cure, mechanics",ds:"Lion. Causes and cures disease.",tr:3,phil:"That one force governs both affliction and healing reveals the Hermetic principle of polarity at work in flesh. Marbas mediates Martian fire in the body — the same inflammation that destroys also, under different conditions, restores. Agrippa's spirits of the mechanical arts are shapers of hylē, the formative forces of Binah operating through matter."},
{n:6,nm:"Valefor",rk:"Duke",pl:"Venus",si:"Taurus",lg:10,pw:"Thievery, familiars",ds:"Donkey head. Good familiars.",tr:2,phil:"Valefor represents Venusian desire operating outside sanctioned channels — a trickster-force with only ten legions. His secondary office of granting good familiars suggests the same boundary-crossing energy that enables covert acquisition also guards the intimate threshold between the magician and their working companions."},
{n:7,nm:"Amon",rk:"Marquis",pl:"Moon",si:"Taurus",lg:40,pw:"Discord, reconciliation",ds:"Wolf with serpent tail.",tr:3,phil:"Amon's dual power over discord and reconciliation mirrors Yesod's function in Kabbalistic psychology — the sphere of the Moon holds both the shadow-self and its integration. His wolf and serpent form is ancient; instinct and cunning held in the same being, the natural forces of attraction and repulsion that govern all relationships."},
{n:8,nm:"Barbatos",rk:"Duke",pl:"Venus",si:"Taurus",lg:30,pw:"Animal speech, treasure",ds:"Understands birds and animals.",tr:2,phil:"Understanding the speech of animals opens the pre-verbal consciousness Agrippa calls the elemental soul of natural creatures. Barbatos governs the Venusian sympathy between kingdoms; the practitioner who genuinely listens to animals has opened the perceptual field of the anima mundi itself."},
{n:9,nm:"Paimon",rk:"King",pl:"Sun",si:"Gemini",lg:200,pw:"Arts, sciences, dignity",ds:"Crowned king on camel.",tr:4,phil:"Paimon's two hundred legions — the largest in the Goetia — signal a solar force of extraordinary breadth. His mastery of all arts, sciences, and the hidden nature of the earth places him functionally at Chesed, expansive royal knowledge; yet his binding to Lucifer makes him a king within the inverted hierarchy. The Lemegeton's explicit requirements for prior offerings acknowledge a force that must be treated as sovereign."},
{n:10,nm:"Buer",rk:"President",pl:"Jupiter",si:"Gemini",lg:50,pw:"Philosophy, herbs, healing",ds:"Philosophy and herbal medicine.",tr:2,phil:"Buer's Jupiter rulership and combined offices of philosophy and herbal healing align him directly with Chesed as the sphere of mercy and divine law expressed through nature. At the time of the Lemegeton's composition, philosophy and medicine were considered branches of the same discipline — the study of the soul's proper relationship to its material vessel."},
{n:11,nm:"Gusion",rk:"Duke",pl:"Mercury",si:"Gemini",lg:40,pw:"Honor, divination, reconciliation",ds:"Past, present, future.",tr:2,phil:"Mercury governs correspondences, and Gusion teaches the correspondence between inner worth and external reputation — the Hod-function of honest communication applied to social standing. His simultaneous knowledge of past, present, and future situates him in the eternal now of Yesod, where time is perceived as pattern rather than sequence."},
{n:12,nm:"Sitri",rk:"Prince",pl:"Venus",si:"Gemini",lg:60,pw:"Love, lust, secrets",ds:"Leopard with griffin wings.",tr:3,phil:"Sitri's leopard-and-griffin form combines terrestrial predation with aerial freedom — love in its consuming, overwhelming aspect rather than its gentle register. His sixty legions and Prince rank place him above ordinary Venusian desire, touching the root of the will-to-union that Kabbalistic doctrine attributes to Binah receiving the divine overflow."},
{n:13,nm:"Beleth",rk:"King",pl:"Sun",si:"Cancer",lg:85,pw:"Love",ds:"Pale horse with music.",tr:4,phil:"The Lemegeton requires the operator approach Beleth with a hazel wand, a drawn triangle, and genuine courage — behavioral requirements that signal a King-level force testing the practitioner's preparedness. His dominion over absolute, fated love connects him to the overwhelming aspect of Chesed as it dissolves the ego's resistance to union."},
{n:14,nm:"Leraje",rk:"Marquis",pl:"Mars",si:"Cancer",lg:30,pw:"Battles, festering wounds",ds:"Archer in green.",tr:3,phil:"Leraje governs wounds that putrefy — the Mars function of inflammation carried past its healing threshold into suppuration. His archer form is the Geburah current expressing through precision-aggression: every wound he inflicts is targeted. Operations involving him inevitably invoke the full Martian force of dissolution-through-conflict."},
{n:15,nm:"Eligos",rk:"Duke",pl:"Mars",si:"Cancer",lg:60,pw:"Wars, military secrets, future",ds:"Knight on horseback.",tr:3,phil:"Eligos reveals hidden things in wars and predicts outcomes — the intersection of Geburah (force, conflict) and Hod (intelligence, strategy) where military art properly lives on the Tree. His sixty legions are substantial; he is not inherently destructive but his entire domain is organized violence and its foresight."},
{n:16,nm:"Zepar",rk:"Duke",pl:"Venus",si:"Cancer",lg:26,pw:"Love, fertility, barrenness",ds:"Red armor. Fertility.",tr:3,phil:"Zepar's power to cause barrenness is appended in the Goetia almost as a warning — love magic that overrides another's will touches the free-will doctrine underlying the grimoire tradition's implicit ethics. His Venus rulership is deceptive; he operates in the compulsive rather than reciprocal register of Venusian force."},
{n:17,nm:"Botis",rk:"President",pl:"Mars",si:"Leo",lg:60,pw:"Reconciliation, past and future",ds:"Viper then human with sword.",tr:3,phil:"A viper who becomes a human holding a sword — Botis manifests the liminal nature of his office in his form. He reconciles enemies and reveals past and future through the Martian-Yesodic interface where memory, shadow, and will converge. His sixty legions give him substantial power; his viper-origin signals that transformation, not gentleness, is his fundamental mode."},
{n:18,nm:"Bathin",rk:"Duke",pl:"Mercury",si:"Leo",lg:30,pw:"Herbs, precious stones",ds:"Man with serpent tail.",tr:2,phil:"Bathin's serpent tail marks him as a threshold spirit, but his office — teaching the properties of herbs and stones — is firmly in the productive tradition of natural magic. Mercury governs correspondences, and Bathin teaches the correspondence network itself: how earthly materials carry celestial signatures. A genuinely instructive force."},
{n:19,nm:"Sallos",rk:"Duke",pl:"Venus",si:"Leo",lg:30,pw:"Love",ds:"Soldier on crocodile.",tr:2,phil:"One of the Goetia's gentler spirits, Sallos causes love without compulsion. His crocodile mount is an Egyptian symbol of patient, latent power — not absent but waiting. His Venus rulership expresses here in the reciprocal rather than obsessive register, making him the appropriate contact for workings where genuine affection is sought rather than compelled."},
{n:20,nm:"Purson",rk:"King",pl:"Sun",si:"Leo",lg:22,pw:"Divination, treasure, familiars",ds:"Lion face. Familiars.",tr:4,phil:"Purson discovers hidden truth by genuine means — a King of revelation rather than compulsion. His modest twenty-two legions do not diminish his sovereign nature; the Goetia's Kings embody cosmic authority that operates through title rather than force of numbers. The lion-faced form signals solar discernment: he sees clearly what others cannot."},
{n:21,nm:"Marax",rk:"President",pl:"Saturn",si:"Virgo",lg:30,pw:"Astronomy, the occult virtues",ds:"Bull with human face.",tr:2,phil:"Marax's bull-and-human form echoes the Cherubic living creature of traditional Kabbalistic iconography — the earth-force elevated to understanding. He governs astronomy and the occult virtues of herbs, a Saturn spirit who embodies the contemplative, structuring aspect of Binah without its destructive shadow."},
{n:22,nm:"Ipos",rk:"Prince",pl:"Jupiter",si:"Virgo",lg:36,pw:"Wit, courage, hidden things",ds:"Angel with lion head.",tr:2,phil:"Ipos appears as an angel with a lion's head — a composite form signaling a spirit that bridges the celestial and the martial. His office of granting genuine wit and courage is constructive; Jupiter's philosophical expansion channeled into practical intelligence and fortitude. Among the more benign Princes, his angelic form is not incidental."},
{n:23,nm:"Aim",rk:"Duke",pl:"Mars",si:"Virgo",lg:26,pw:"Setting fires, wit",ds:"Three heads.",tr:3,phil:"Aim's three heads and power to set cities on fire make him a Mars-adjacent spirit despite his Duke rank. Fire in the alchemical register is both the agent of purification and of uncontrolled dissolution — the same force that burns away impurity can consume what was meant to endure. His secondary gift of wit reflects the illuminating rather than destroying face of flame."},
{n:24,nm:"Naberius",rk:"Marquis",pl:"Mercury",si:"Virgo",lg:19,pw:"Rhetoric, all arts, restoring dignity",ds:"A crow. Rhetoric.",tr:2,phil:"Naberius appears as a black crow — the bird of Binah in Kabbalistic colour-symbolism, carrying the dark wisdom of the great sea of understanding. His mastery of rhetoric and restoration of dignities makes him a Mercurial reconciler: he operates through the precision of articulation to restore what careless speech has damaged."},
{n:25,nm:"Glasya-Labolas",rk:"President",pl:"Mars",si:"Libra",lg:36,pw:"Sciences, murder, bloodshed",ds:"Dog with griffin wings.",tr:4,phil:"The Goetia issues one of its strongest cautions here: Glasya-Labolas teaches all arts instantly but also teaches murder. The inseparability of these gifts — rapid knowledge acquisition and lethal capacity — marks a spirit whose offerings cannot be cleanly divided from their shadow. His dog-and-griffin form suggests the hunter elevated to aerial perspective: he sees where wounds can be precisely placed."},
{n:26,nm:"Bune",rk:"Duke",pl:"Saturn",si:"Libra",lg:30,pw:"Wealth, eloquence, spirits of the dead",ds:"Dragon, three heads.",tr:2,phil:"Bune's three-headed dragon form holds the three aspects of Binah — understanding, death, and genesis — in a single being. Wealth in grimoire doctrine is always connected to wisdom of proper proportion; Bune teaches how to acquire without spiritual depletion. His dragon form is ancient and fundamentally wise rather than threatening."},
{n:27,nm:"Ronove",rk:"Marquis",pl:"Mercury",si:"Libra",lg:19,pw:"Languages, rhetoric, favor of friends",ds:"Rhetoric and languages.",tr:2,phil:"Ronove governs the practical arts of language and social exchange — Mercury's Hod function applied with deliberate precision. His nineteen legions are modest and his constructive orientation is consistent throughout the sources. He is the grammarian among the Goetia: the spirit of technical precision in speech as the foundation of all other operations."},
{n:28,nm:"Berith",rk:"Duke",pl:"Mars",si:"Libra",lg:26,pw:"Alchemy, transmutation",ds:"Soldier in red. Metals to gold.",tr:3,phil:"The Goetia issues a specific behavioral warning about Berith: he is a liar and cannot be trusted unless constrained in the triangle. This explicit caution — unusual in grimoire literature — elevates the approach requirement. His transmutation power is genuine but his Mars-red form signals that the forge operates best under constraint rather than free-form conversation."},
{n:29,nm:"Astaroth",rk:"Duke",pl:"Venus",si:"Scorpio",lg:40,pw:"Sciences, divination, angel lore",ds:"Angel on infernal dragon.",tr:3,phil:"Astaroth has clear continuity with Astarte and Ishtar — among the oldest named spirits in Western tradition. The Goetia's instruction to hold a silver ring to the nose during invocation signals that her emanation is overwhelming rather than absent; too much Venusian-astral force too quickly. Her self-awareness about the angelic fall, which she laments, marks her as a spirit of profound and troubling knowledge."},
{n:30,nm:"Forneus",rk:"Marquis",pl:"Mercury",si:"Scorpio",lg:29,pw:"Rhetoric, languages, love of enemies",ds:"Sea monster.",tr:2,phil:"Forneus the sea-monster secures the love and favor of enemies through language — a paradox resolved by understanding communication as the great dissolver of hostility. His Mercury-Scorpio nature applies sharp psychological intelligence to the problem of reconciliation: he does not soften conflict but articulates its terms until resolution becomes possible."},
{n:31,nm:"Foras",rk:"President",pl:"Saturn",si:"Scorpio",lg:29,pw:"Logic, longevity, invisibility",ds:"Strong man.",tr:2,phil:"Foras governs logic, the art of living long, and the discovery of plants and stones — a Saturn spirit who channels Binah's aspect of deep patient knowledge. Logic is the structural skeleton of all magical systems; a spirit who teaches it purely serves the operator's fundamental capacity for coherent working without distortion."},
{n:32,nm:"Asmoday",rk:"King",pl:"Sun",si:"Scorpio",lg:72,pw:"Math, astronomy, geomancy",ds:"Three heads.",tr:4,phil:"Asmodeus — likely derived from the Avestan Aeshma Daeva — commands seventy-two legions and requires the silver ring of Solomon. His three heads span bull, man, and ram, embodying the full range of earthly desire and intellect. His mathematical and astronomical knowledge is genuine and profound, but the Lemegeton's binding requirements make clear it is not freely given."},
{n:33,nm:"Gaap",rk:"President",pl:"Saturn",si:"Sagittarius",lg:66,pw:"Philosophy, passions, transport",ds:"Philosophy.",tr:3,phil:"Gaap occupies a peculiar position: he teaches philosophy but can also cause philosophers to become ignorant. His sixty-six legions rival a King's, and his power to transport men between kingdoms instantly makes him a spirit of sudden, disorienting movement. The Saturn-Sagittarius tension holds contraction and philosophical expansion in dynamic opposition."},
{n:34,nm:"Furfur",rk:"Earl",pl:"Mars",si:"Sagittarius",lg:26,pw:"Love, storms, thunder",ds:"Hart with fiery tail.",tr:3,phil:"The Goetia explicitly warns that Furfur lies unless constrained within the triangle — a behavioral note that determines his approach tier. His hart-with-fiery-tail form expresses the Mars-Sagittarius tension: noble swiftness and aggressive fire combined. Love and storm are both operations of raw undirected force; Furfur cannot be trusted to distinguish between them without formal constraint."},
{n:35,nm:"Marchosias",rk:"Marquis",pl:"Mars",si:"Sagittarius",lg:30,pw:"Fighting, reliable answers",ds:"Wolf with wings.",tr:3,phil:"A Marquis who was once of the Order of Dominations and hopes to return — the Goetia's biographical detail here is rare and revealing. Marchosias is a warrior who retains memory of a higher order, making him both trustworthy in combat-related workings and potentially volatile in aspirational ones. His wolf-and-griffin form combines pack-instinct with aerial perspective."},
{n:36,nm:"Stolas",rk:"Prince",pl:"Jupiter",si:"Sagittarius",lg:26,pw:"Astronomy, herbs, precious stones",ds:"Raven then man.",tr:2,phil:"Stolas appears as a raven — the bird of Binah — before taking human form, signaling that his wisdom flows from the great sea of understanding into practical application. His Jupiter rulership places him at Chesed, and his systematic teaching function is what the grimoire tradition most values in Princes: the generous dissemination of organized knowledge."},
{n:37,nm:"Phenex",rk:"Marquis",pl:"Sun",si:"Capricorn",lg:20,pw:"Sciences, poetry",ds:"Phoenix bird.",tr:2,phil:"Phenex the Phoenix is among the most symbolically resonant of the Goetic spirits. The phoenix is the alchemical image of death and resurrection through fire; his offices of poetry and science reflect the dual solar nature — illumination through beauty and through analysis. He is a Marquis of the Sun whose operations genuinely uplift rather than merely provide."},
{n:38,nm:"Halphas",rk:"Earl",pl:"Mars",si:"Capricorn",lg:26,pw:"Building fortifications, war",ds:"Stock dove.",tr:3,phil:"Halphas builds towers of war and fills them with ammunition — a pure Martian-Capricornian force, constructive but entirely oriented toward conflict. His stock-dove form is one of the Goetia's most ironic: the bird of peace carries the spirit of fortification. His twenty-six legions are moderate but his operations inevitably engage the full domain of conflict preparation."},
{n:39,nm:"Malphas",rk:"President",pl:"Mars",si:"Capricorn",lg:40,pw:"Building, familiars",ds:"Crow then man.",tr:2,phil:"Malphas builds structures at remarkable speed and provides familiars — a constructive spirit despite his crow form, which again speaks to Binah's pattern-recognition applied to physical construction. Some editions warn he deceives when receiving offerings, suggesting a spirit who rewards directness and punishes flattery with particular sharpness."},
{n:40,nm:"Raum",rk:"Earl",pl:"Mercury",si:"Capricorn",lg:30,pw:"Theft, destroying cities, love",ds:"Crow.",tr:3,phil:"Raum steals treasure and destroys cities — explicitly destructive operations under Mercury's mercurial intelligence. His secondary capacity for love and reconciliation reveals him as a spirit of transformation-through-loss: what he takes from one context he may redistribute elsewhere. Destruction and redistribution are his twin operations, not morally separable."},
{n:41,nm:"Focalor",rk:"Duke",pl:"Saturn",si:"Aquarius",lg:30,pw:"Wind, drowning, sinking ships",ds:"Man with griffin wings.",tr:3,phil:"The Goetia notes that Focalor hoped to return to heaven after a thousand years — a note of fallen aspiration that gives him a tragic dimension not shared by most Goetic spirits. He is not evil by inherent nature but by function: he drowns men and overthrows ships. His Saturn-Aquarian nature channels the cold intellectual aspect of water as force without mercy."},
{n:42,nm:"Vepar",rk:"Duke",pl:"Saturn",si:"Aquarius",lg:29,pw:"Waters, ships, infected wounds",ds:"Mermaid.",tr:3,phil:"Vepar governs the sea in its dangerous aspect — she raises storms and infects wounds until they teem. The mermaid form signals the seductive and lethal face of the watery unconscious: beautiful, cold, and indifferent to survival. Her operations touch physical mortality in ways that require the circle's full containment."},
{n:43,nm:"Sabnock",rk:"Marquis",pl:"Mars",si:"Aquarius",lg:50,pw:"Fortifications, afflicting wounds",ds:"Soldier, lion head.",tr:3,phil:"Sabnock builds fortifications and afflicts men with wounds that putrefy and breed worms — the martial architect whose constructive and destructive operations share the same underlying force. His fifty legions give him substantial command across both domains; the same intelligence that plans the wall also plans the siege that breaches it."},
{n:44,nm:"Shax",rk:"Marquis",pl:"Mercury",si:"Aquarius",lg:30,pw:"Removing sight, hearing, theft",ds:"Stock dove.",tr:3,phil:"The Goetia explicitly states Shax is a liar and must be constrained in the triangle before he answers truthfully — a behavioral warning that determines his tier. He takes sight and hearing; he steals horses. This pattern of subtle subtraction makes the triangle not merely conventional but functionally necessary: he operates through what he removes from your perception."},
{n:45,nm:"Vine",rk:"King",pl:"Sun",si:"Pisces",lg:36,pw:"Storms, witchcraft, building towers",ds:"Lion on black horse.",tr:4,phil:"A King who reveals witches, pulls down walls, and troubles waters simultaneously embodies the sovereign capacity for exposure and overthrow. Vine's Sun-Pisces nature brings solar illumination through the dissolving medium of the vast waters — he reveals what hides in depth by turbulence rather than by clarity. A powerful force of destabilization in the hands of one not prepared for its consequences."},
{n:46,nm:"Bifrons",rk:"Earl",pl:"Saturn",si:"Pisces",lg:60,pw:"Astrology, herbs, moving corpses",ds:"Monster then man.",tr:3,phil:"Bifrons moves bodies from graves and places luminous candles above them to simulate life — a necromantic operation at the outer limits of the grimoire tradition. His knowledge of astrology and herbal properties is genuine and substantial, but his primary operation involves interference with the dead that places him firmly in the territory requiring full protective procedure."},
{n:47,nm:"Uvall",rk:"Duke",pl:"Venus",si:"Pisces",lg:37,pw:"Love, languages, friendship of enemies",ds:"Great camel.",tr:2,phil:"Uvall appears as a great camel — the animal of long patience and vast distances — and his operations reflect this: causing love by sustained attunement rather than compulsion, procuring friendship through the generous Venusian field. He is one of the more consistently benevolent Goetic spirits, his camel-form signaling endurance and reliable delivery rather than sudden overwhelming force."},
{n:48,nm:"Haagenti",rk:"President",pl:"Mercury",si:"Pisces",lg:33,pw:"Transmutation, wine into water",ds:"Bull with wings.",tr:2,phil:"Haagenti teaches transmutation — changing wine into water and vice versa, converting metals. In alchemical terms this is the solve et coagula principle applied to substance. Mercury governs all transformation of form while essence remains, and Haagenti's friendly ox-form signals a constructive, grounded engagement with what might otherwise seem like volatile alchemical operation."},
{n:49,nm:"Crocell",rk:"Duke",pl:"Moon",si:"Aries",lg:48,pw:"Geometry, warming waters",ds:"An angel.",tr:2,phil:"Crocell appears as an angel — the Goetia's most benign possible form — and speaks in mystical tones about things that occurred before and since the Fall. His knowledge of geometry and power to warm waters place him at the intersection of the cosmic and the domestic. A Moon spirit who governs water and speaks of eternity: genuinely accessible to the sincere practitioner."},
{n:50,nm:"Furcas",rk:"Knight",pl:"Saturn",si:"Aries",lg:20,pw:"Philosophy, astronomy, logic, palmistry",ds:"Cruel old man.",tr:1,phil:"Furcas is the only Knight among the seventy-two — the lowest rank of the Goetic hierarchy, a mercenary scholar rather than a noble commander. His offices of philosophy, astronomy, logic, and palmistry are pure knowledge-domains without destructive application. Saturn's contemplative face here looks upward at the fixed stars rather than downward at material constraint."},
{n:51,nm:"Balam",rk:"King",pl:"Sun",si:"Taurus",lg:40,pw:"Invisibility, wit, divination",ds:"Three heads on bear.",tr:4,phil:"Balam's three heads — bull, man, and ram with serpent tail — span in the grimoire's internal symbolism the full range of earthly manifestation: instinct, intelligence, and the regenerative serpent-power below. His ability to grant invisibility and perfect prophetic answers makes him one of the more coveted Goetic Kings, which is precisely why his title demands the strictest approach."},
{n:52,nm:"Alloces",rk:"Duke",pl:"Mars",si:"Taurus",lg:36,pw:"Astronomy, liberal arts",ds:"Soldier on horse.",tr:3,phil:"Alloces teaches astronomy and all liberal arts, but sources note he drives men to lewdness and excessive military action as side-effects. This pattern — genuine knowledge acquisition accompanied by behavioral distortion of the practitioner's state — marks a spirit whose gifts come with an influence that accumulates without proper protective boundary."},
{n:53,nm:"Camio",rk:"President",pl:"Moon",si:"Gemini",lg:30,pw:"Understanding birds and animals",ds:"Thrush then man.",tr:2,phil:"Camio appears as a thrush and then as a man carrying a sharp sword: the bird signals perception through song, the sword signals the discernment that distinguishes genuine understanding from projection. He gives the understanding of animals and birds — access to the pre-linguistic perceptual field of the anima mundi — and his Moon-Gemini nature makes him genuinely communicative."},
{n:54,nm:"Murmur",rk:"Duke",pl:"Saturn",si:"Gemini",lg:30,pw:"Philosophy, constraining souls of the dead",ds:"Warrior on griffin.",tr:3,phil:"Murmur constrains souls of the dead through philosophical discourse — necromancy executed through the Saturnian discipline of rigorous argumentation. His warrior-on-griffin form signals the elevation of the soul through combat with its own phantasms. Not gratuitously dangerous, but necromantic operations carry inherent risk of attaching inorganic entities to the operator, requiring proper banishing."},
{n:55,nm:"Orobas",rk:"Prince",pl:"Jupiter",si:"Cancer",lg:20,pw:"Divination, truth, favor",ds:"Horse then man. Good nature.",tr:2,phil:"The Lemegeton notes that Orobas will not suffer any other spirits to deceive the magician — an almost unique protective characteristic that places him in a different moral category. His horse-then-man form signals the taming of animal nature into orderly communication; a Prince who actively protects the operator is not merely neutral but genuinely allied."},
{n:56,nm:"Gremory",rk:"Duke",pl:"Venus",si:"Cancer",lg:26,pw:"Treasure, love of women",ds:"Beautiful woman on camel.",tr:2,phil:"Gremory the beautiful woman on a camel reveals where treasure is hidden and obtains love through the patient Venusian field rather than compulsion. The camel signals long-distance reliable procurement; her operations are not urgent or overwhelming but steady and demonstrably honest about their nature. Among the more ethically straightforward Venusian forces."},
{n:57,nm:"Ose",rk:"President",pl:"Mercury",si:"Leo",lg:30,pw:"Sciences, making men believe they are kings",ds:"Leopard then man.",tr:3,phil:"Ose can make any man believe himself to be a king or a pope, or transform him into any shape — this power over the identity-perception places him in a concerning category. Shapeshifting operations in the grimoire tradition always touch the stability of the self; formal protective boundary exists precisely to preserve the operator's ontological coherence while working with a spirit of this kind."},
{n:58,nm:"Amy",rk:"President",pl:"Saturn",si:"Leo",lg:36,pw:"Astrology, familiars, treasure",ds:"Flaming fire then man.",tr:2,phil:"Amy appears as a flame of fire before becoming a man — the alchemical progression from raw force to disciplined intelligence. His perfect knowledge of astrology, provision of excellent familiars, and discovery of treasures hidden by spirits place him among the most straightforwardly constructive of the Goetic Presidents. Saturn's gathering-and-preserving function expressed generously."},
{n:59,nm:"Oriax",rk:"Marquis",pl:"Moon",si:"Virgo",lg:30,pw:"Astrology, virtues of stars, transformations",ds:"Lion on horse.",tr:2,phil:"Oriax teaches astrology and the virtues of individual stars — the transmission of celestial signature into human understanding through the Moon's mediating function. His secondary office of causing honest transformation (showing men as they truly are) makes him a spirit of genuine revelation; Virgo's analytical Mercury operates through him as precision of perception."},
{n:60,nm:"Vapula",rk:"Duke",pl:"Mercury",si:"Virgo",lg:36,pw:"Crafts, mechanics, philosophy",ds:"Lion, griffin wings.",tr:2,phil:"Vapula governs crafts, mechanics, and philosophy simultaneously — the medieval understanding that material skill and theoretical knowledge are continuous. His lion-and-griffin form honors both earth and air; Virgo's Mercury rules craft and analysis equally. Among the most intellectually complete of the Goetic Dukes, and genuinely constructive in all recorded operations."},
{n:61,nm:"Zagan",rk:"King",pl:"Sun",si:"Libra",lg:33,pw:"Transmutation, making fools wise",ds:"Bull with wings.",tr:4,phil:"A King who transmutes metals and makes fools wise — again the Kabbalistic paradox of opposites governed by a single sovereign force. His bull-with-wings form echoes the Cherub of Ezekiel, the living creature of the earth element elevated through divine fire. As King he requires the full approach regardless of his constructive operations; the title carries its own necessity."},
{n:62,nm:"Valac",rk:"President",pl:"Mercury",si:"Libra",lg:38,pw:"Finding treasure, command over serpents",ds:"Boy with angel wings.",tr:2,phil:"Valac appears as a small poor boy with angel's wings — the Goetia's image of innocent knowledge applied to the earthly domain. His command over serpents signals knowledge of Malkuth's deep wisdom and the formative forces operating through physical nature. The child-form is not deceptive; Presidents who manifest this way typically represent genuinely accessible forces."},
{n:63,nm:"Andras",rk:"Marquis",pl:"Mars",si:"Scorpio",lg:30,pw:"Discord, sowing hatred",ds:"Raven-headed angel. DANGEROUS.",tr:4,phil:"The Goetia issues its most explicit warning for Andras: he will slay the master as well as the servant if the operator is incautious. A raven-headed angel under Mars-Scorpio, he embodies pure Geburic force without Chesed's redemptive structure: discord that dissolves rather than purges. This tier reflects not procedural caution but the grimoire's own unambiguous assessment."},
{n:64,nm:"Haures",rk:"Duke",pl:"Mars",si:"Scorpio",lg:36,pw:"Destruction, burning enemies, creation lore",ds:"Leopard then fierce man.",tr:4,phil:"Haures appears as a leopard before taking the form of a fierce flaming man. He can destroy enemies utterly and speaks knowledgeably about the creation of the world and divine things — but the sources are explicit that he lies unless constrained in a triangle, and his destructive power makes errors irreversible. The combination of deceptive behavior with lethal capacity places him at the highest tier."},
{n:65,nm:"Andrealphus",rk:"Marquis",pl:"Moon",si:"Sagittarius",lg:30,pw:"Geometry, measurement",ds:"Peacock.",tr:2,phil:"Andrealphus appears as a peacock — the bird of wholeness, the 'eye' that sees all directions simultaneously. His teaching of geometry and measurement connects to sacred geometry's role as the language of divine proportion. His power to transform men into birds is a shamanic operation — expansion of perceptual range — and his orientation throughout the sources is constructive."},
{n:66,nm:"Cimejes",rk:"Marquis",pl:"Mars",si:"Sagittarius",lg:20,pw:"Grammar, logic, rhetoric",ds:"Warrior on black horse.",tr:2,phil:"Cimejes teaches the trivium — grammar, logic, and rhetoric — the foundational arts of ordered reason. His warrior-on-black-horse form suggests the disciplined soldier of the mind rather than the berserker; Mars in Sagittarius channels aggression into philosophical precision. He is the spirit of rigorous argumentation, and his twenty legions are modest."},
{n:67,nm:"Amdusias",rk:"Duke",pl:"Jupiter",si:"Capricorn",lg:29,pw:"Music, bending trees",ds:"Unicorn then man.",tr:2,phil:"Amdusias the unicorn governs music and causes trees to incline toward the summoner — a spirit of natural harmonic resonance. Music in the medieval worldview was the mathematical expression of celestial proportion, the Music of the Spheres made audible. His unicorn form signals the purity of nature channeled through beauty; his operations are among the most benign in the entire catalogue."},
{n:68,nm:"Belial",rk:"King",pl:"Sun",si:"Capricorn",lg:80,pw:"Dignities, favor, senators",ds:"Two angels in chariot of fire.",tr:4,phil:"Belial — 'worthlessness' or 'without yoke' — is one of the four principal spirits of the Lemegeton and requires offerings and gifts before he speaks truthfully. His eighty legions and chariot-of-fire form are commensurate with his fundamental significance. He gives dignities, excellent familiars, and causes love — genuinely powerful operations — but his deceptive baseline makes the full Solomonic apparatus functionally necessary."},
{n:69,nm:"Decarabia",rk:"Marquis",pl:"Moon",si:"Aquarius",lg:30,pw:"Herbs, stones, birds as familiars",ds:"Star in pentacle.",tr:2,phil:"Decarabia appears as a star within a pentagram — the most explicitly sacred of all Goetic forms. The pentagram is the sigil of the microcosm and the balanced five elements; a spirit who appears within it signals harmony with the structure of magical practice itself. His operations are natural-magical in the gentlest register, and his form suggests genuine alignment with the practitioner's protective framework."},
{n:70,nm:"Seere",rk:"Prince",pl:"Jupiter",si:"Aquarius",lg:26,pw:"Swift transport, abundance",ds:"Man on winged horse.",tr:2,phil:"The Goetia characterizes Seere as 'indifferent to good or evil, willing to do the operator's will' — a unique statement suggesting a spirit of pure instrumental service. His power of swift transport and the bringing of abundance makes him a remarkably practical Prince. Approach with clarity of purpose rather than protective fear; he responds to precision of intent."},
{n:71,nm:"Dantalion",rk:"Duke",pl:"Mercury",si:"Pisces",lg:36,pw:"Mind reading, changing thoughts, visions",ds:"Man with many faces.",tr:3,phil:"Dantalion holds a book of all human faces and can transmit the knowledge of any person's mind — he is the spirit of the collective unconscious, the reader of Akashic record. His power to change thoughts makes him a genuine risk to the practitioner's psychological integrity if the protective boundary is not maintained; formal structure exists here not for the spirit's sake but for the operator's."},
{n:72,nm:"Andromalius",rk:"Earl",pl:"Saturn",si:"Pisces",lg:36,pw:"Returning stolen goods, punishing thieves",ds:"Man with serpent.",tr:2,phil:"Andromalius holds a great serpent — the symbol of cyclical wisdom — and his office is restorative justice: returning what was stolen, discovering deceivers, punishing wrongdoers. Among the seventy-two he is unique in being called explicitly for justice rather than acquisition. He represents Geburah's function of righteous correction: the force that restores proper proportion."}

const GAPPROACH="Without a circle, approach only spirits described as 'good nature' (Vassago, Orobas, Barbatos). Burn the incense of their ruling planet, speak their name three times, state your request clearly, and make a planetary offering. For dangerous spirits (Andras, Glasya-Labolas, Beleth), formal protections are essential. Without a circle, petition by writing the spirit's name and seal on parchment with its planetary intelligence's seal above it — the intelligence mediates.";

// ═══ OLYMPIC SPIRITS ═══
const OL=[
{nm:"Aratron",pl:"Saturn",ru:"49 provinces",gov:"Transmutation, agriculture, longevity",ds:"Converts anything to stone, turns lead to gold. Rules 49 provinces.",ap:"Old man with long beard riding a dragon",dy:"Saturday",hr:"1st hour of Saturn",obj:["Lead talisman","Black candle","Myrrh","Obsidian","Cypress branch","Hourglass","Black cloth"],inf:"Fast for a full day before approaching. On Saturday during Saturn's first hour, burn myrrh over charcoal. Sit in darkness with a lead object. Speak his name slowly. Aratron responds to those who have demonstrated patience.",pw:["Transmutation of metals","Making barren land fruitful","Granting invisibility","Conferring long life","Teaching alchemy","Providing familiars"],tr:1,phil:"Aratron is the most explicitly philosophical of the Olympic spirits, governing the Great Work's foundational principle: patience transforming base material into enduring gold. Saturn governs time, and Aratron teaches the practitioner to work within time's discipline rather than against it. His transmutation of lead to gold is the alchemical reading of Binah's constraint becoming Chesed's abundance."},
{nm:"Bethor",pl:"Jupiter",ru:"42 provinces",gov:"Wealth, honor, healing",ds:"Opens treasures, grants dignities, prolongs life to 700 years.",ap:"Man in rich robes of blue and purple",dy:"Thursday",hr:"1st hour of Jupiter",obj:["Tin talisman","Blue/purple candle","Cedar","Amethyst","Oak leaves","Saffron","Purple cloth"],inf:"Approach on Thursday with gifts already given to others. Burn cedar. Wear blue or purple. Hold amethyst. Ask with confidence but not arrogance.",pw:["Opening treasure","Granting honors","Healing diseases","Prolonging life","Providing familiars","Conferring wealth"],tr:1,phil:"Bethor governs Jupiter's most generous expression: the opening of treasures, the prolonging of life, and the conferring of dignities without the distortions of ambition. The Arbatel presents him as one who responds to gifts already given to others — a spirit whose access is unlocked by demonstrated generosity rather than by request. This is Chesed in its purest form."},
{nm:"Phaleg",pl:"Mars",ru:"35 provinces",gov:"Warfare, valor, military honors",ds:"Prince of Mars. Grants military honor through warfare.",ap:"Armed warrior, fierce of countenance",dy:"Tuesday",hr:"1st hour of Mars",obj:["Iron blade","Red candle","Dragon's blood","Garnet","Thorn branches","Red wine","Red cloth"],inf:"Physical preparation before the working — exercise or hard labor. On Tuesday, burn dragon's blood. Hold iron. State what victory you require. Phaleg despises cowardice.",pw:["Granting military honor","Victory in conflict","Courage & valor","Commanding war spirits","Destroying enemies"],tr:1,phil:"Phaleg governs military honor through valor — Mars expressed as the disciplined art of the warrior rather than uncontrolled aggression. The Arbatel's approach to him requires physical preparation, acknowledging that Martian forces respond to demonstrated strength. He embodies Geburah's purifying aspect: the fire that strengthens rather than destroys."},
{nm:"Och",pl:"Sun",ru:"28 provinces",gov:"Gold, wisdom, medicine, illumination",ds:"Grants 600 years of life. Bestows wisdom. Converts anything to gold.",ap:"Figure of brilliant light, crowned with solar rays",dy:"Sunday",hr:"1st hour of Sun",obj:["Gold ring","Golden candle","Frankincense","Amber","Bay laurel","Honey","Yellow cloth"],inf:"At dawn on Sunday, face the rising sun. Burn frankincense. Hold gold or amber. Och is generous to healers and teachers. Offer honey.",pw:["Granting perfect health","Converting things to gold","Teaching medicine","Bestowing wisdom","Granting familiars"],tr:1,phil:"The Arbatel's Och is among its most comprehensive spirits: six hundred years of life, perfect medicine, philosophical wisdom, and the conversion of all things to gold. These are the gifts of Tiphareth — the solar centre of the Tree — given without the distortions of the Goetic register. Dawn, frankincense, and an offered hand are sufficient; Och's accessibility reflects the Arbatel's central teaching that prepared souls need not compel."},
{nm:"Hagith",pl:"Venus",ru:"21 provinces",gov:"Love, beauty, art",ds:"Makes one adorned and beautiful. Causes love.",ap:"Beautiful figure adorned with flowers and jewels",dy:"Friday",hr:"1st hour of Venus",obj:["Copper disc","Green/pink candle","Rose incense","Rose quartz","Fresh roses","Honey","Green silk"],inf:"Beautify yourself and your space before calling. On Friday evening, burn rose incense. Scatter rose petals. Hold copper or rose quartz. Sing or speak poetically.",pw:["Making one beautiful","Causing love","Transmuting copper to gold","Granting artistic talent","Protecting lovers"],tr:1,phil:"Hagith governs beauty, love, and the transmutation of copper — Venus in her freely-given rather than compulsive aspect. Her demand that the practitioner beautify themselves and their space before calling is itself a teaching: she responds to the quality of attention brought to her, not to the force of the invocation. This mirrors the Netzach principle that natural forces attract their kind."},
{nm:"Ophiel",pl:"Mercury",ru:"14 provinces",gov:"Learning, commerce, communication",ds:"Teaches all arts instantly. Grants understanding of tongues.",ap:"Youth with caduceus, moving swiftly",dy:"Wednesday",hr:"1st hour of Mercury",obj:["Mercury dime","Orange/violet candle","Lavender","Agate","Quill and ink","Book","Hazel wand"],inf:"The most accessible Olympic spirit. Write your question on paper rather than speaking it. Burn lavender. Hold agate. Leave a coin at a crossroads afterward.",pw:["Teaching all arts instantly","Providing familiars","Understanding all languages","Eloquence","Success in commerce"],tr:1,phil:"The Arbatel calls Ophiel the most accessible of the Olympic spirits, and his Mercury-governed offices of instant mastery of all arts and facility with all languages make him the natural patron of the student mage. Writing the question rather than speaking it reflects the Mercurial principle that thought crystallized in writing carries a different, more precise frequency than spoken desire."},
{nm:"Phul",pl:"Moon",ru:"7 provinces",gov:"Silver, water, dreams, sea travel",ds:"Converts metals to silver. Heals. Most approachable Olympic spirit.",ap:"Pale figure in flowing robes of silver and white",dy:"Monday",hr:"1st hour of Moon",obj:["Silver coin or bowl","White candle","Camphor","Moonstone","Jasmine","Water bowl","White cloth"],inf:"On Monday night under the moon, fill a silver bowl with water. Burn camphor or jasmine. Gaze into the water and speak Phul's name softly. Offer milk poured on the ground.",pw:["Converting metals to silver","Healing diseases","Giving water spirits","Safe voyages","Prophetic dreams","Governing tides"],tr:1,phil:"Phul is described as the most approachable of all Olympic spirits — the Moon as great mediator, meeting the practitioner where they are. His silver-conversion, healing, and dream-governance all express Yesod as the sphere of interface between inner and outer worlds.",tr:1,phil:"Phul is described as the most approachable of all Olympic spirits — the Moon mediating between celestial and terrestrial, meeting the practitioner where they are. His conversion of metals to silver, healing, and governance of dreams all express Yesod as the sphere of interface between inner and outer worlds."}

{nm:"Salamanders",el:"Fire",ruler:"Djinn",c:"#c44520",ds:"Beings of living flame. Volatile and dangerous but immensely powerful.",obj:["Red candles","Brazier or fire pit","Sulfur","Dragon's blood","Iron blade","Garlic","Chili peppers","Volcanic stone","Red cloth","Flint and steel"],inf:"Light a fire — even a candle. Stare into the flame until your eyes water. Speak to the flame as though alive. Offer dried herbs or paper with your desire burned in the flame. Never approach water or show fear. Dance around the fire or fast until you feel burning hunger.",ops:["Purification","Transmutation","Destroying obstacles","Igniting passion","Pyromancy"],cor:"South, noon, Summer, red, brass & iron, lion & serpent",tr:2,phil:"Salamanders embody fire as the primary creative-destructive force — in Kabbalistic terms, the Esh of Geburah before it is tempered by Chesed. The alchemical tradition assigns them to the sulfuric principle, the agitating agent that initiates transformation. They are volatile because pure Martian fire without a vessel for it tends toward the uncontrolled; approach through the contained flame, not the bonfire."},
{nm:"Sylphs",el:"Air",ruler:"Paralda",c:"#7a9ab0",ds:"Creatures of wind and thought. Swift, intellectual, changeable.",obj:["Yellow candles","Feathers","Frankincense or sage","Wind chimes or bells","Fan","Lavender","Hazel wand","Wind instrument","Parchment and ink","Clear quartz"],inf:"Go to a high place on a windy day. Burn sage and watch the smoke — patterns are how Sylphs communicate. Speak questions aloud and listen. Hang wind chimes or ring a bell. Write your request on paper and release it to the wind. Singing or playing a wind instrument attracts them.",ops:["Intellectual inspiration","Long-distance communication","Travel","Aeromancy","Carrying messages","Prophecy"],cor:"East, dawn, Spring, yellow, mercury & tin, eagle & hawk",tr:1,phil:"Sylphs are the spirits of Ruach — the divine breath, the formative air that carries both thought and creative speech. Agrippa places air as the medium through which all celestial influences descend to earth, making Sylphs the natural intermediaries of intellectual inspiration. Their communicative nature and swiftness align with Hod's function as the sphere of divine message and accurate transmission."},
{nm:"Undines",el:"Water",ruler:"Nicksa",c:"#2a4a8a",ds:"Spirits of water. Deeply emotional and empathic, drawn to human feeling.",obj:["Blue candles","Silver bowl of water","Seashells","Coral","Pearls","Camphor","Moonstone","Chalice","Blue cloth","Rain water"],inf:"Go to natural water. If unavailable, fill a bowl with rain or spring water and add sea salt. Gaze into the water as a mirror. Speak softly. Tears are the most powerful offering. Pour milk or honey into the water. Singing near water attracts Undines. Never approach with anger.",ops:["Love & emotional healing","Purification","Dreams & visions","Fertility","Hydromancy","Safe voyages"],cor:"West, twilight, Autumn, blue, silver & copper, dolphin & fish",tr:1,phil:"Undines govern Mayim — the primordial waters of Binah's upper sea, here expressed as the living waters of emotional and imaginative life. Water in Kabbalistic cosmology is the medium of divine compassion, and Undines are drawn to genuine human feeling because they are its elemental personification. The practitioner who approaches weeping is offering the most direct possible communication with these spirits."},
{nm:"Gnomes",el:"Earth",ruler:"Ghob",c:"#5a7a3a",ds:"Spirits of earth. Slow but immensely powerful. Guard treasures.",obj:["Green or brown candles","Sea salt","Stones and crystals","Soil or clay","Oak wood","Patchouli","Cypress","Bread offering","Coins","Seeds","Roots","Bone"],inf:"Place hands on bare earth. Sit on the ground. Sit in silence for a long time before speaking. Bury a coin or seed as offering. Burn patchouli. Hold a stone you found yourself. Speak slowly and plainly. Leave bread on the ground. Gnomes are slowest to respond but most lasting.",ops:["Finding treasure","Prosperity","Herb & stone healing","Protection","Building","Geomancy"],cor:"North, midnight, Winter, green/brown, lead & stone, bull & stag"}

const ECAT_META={"love": {"desc": "Venus and Moon operations for drawing, kindling, and deepening love bonds. Rooted in Netzach — the sphere of desire, beauty, and the creative force in all living things. Love working operates on the divine principle that eros is not base but sacred: the same force that moves the heavens expressed at the human scale.", "guide": "Face West at the Venus hour on Friday, Moon waxing in Taurus, Libra, or Pisces. Altar: copper disc or coin, rose quartz, fresh roses, pink or green candle, honey, rose water. Anoint yourself with rose water before beginning. Open by vibrating the Shem angel’s divine name three times. Recite the assigned Psalm fully, dwelling on the key verse as a petition. State your intent specifically — love working operates on specific situations, not abstractions. If invoking a Goetic spirit, call the governing Shem angel first to consecrate the space and establish divine authority, then speak to the Goetic spirit within that sanctified frame. Close by offering honey or sweet wine poured onto earth. Never petition for the removal of another’s free will — work instead to make yourself more genuinely lovable or to remove obstacles between two willing hearts.", "shemNms": ["Jeliel", "Haziel", "Iezalel", "Chavakiah", "Mihael", "Umabel"], "goetNms": ["Sitri", "Beleth", "Zepar", "Sallos", "Uvall", "Gremory", "Dantalion"], "olNm": "Hagith"}, "wealth": {"desc": "Jupiter and Sun operations for prosperity, abundance, and right employment of material means. Rooted in Chesed — the divine mercy that pours out abundance without condition. Wealth working is not the pursuit of greed but the alignment with the divine generosity: asking that the good you are meant to do in the world be properly resourced.", "guide": "Face North at the Jupiter hour on Thursday, Moon waxing in Taurus, Leo, Sagittarius, or Capricorn. Altar: tin talisman or large coin, amethyst or lapis lazuli, royal blue or purple candle, cedar or nutmeg, oak leaves or acorns, purple grapes. Give to charity before the working — Jupiter opens the flow of abundance by demonstration, not petition. Open by vibrating the divine name Tzadkiel (the archangel’s name, meaning righteousness of God). Recite the Psalm of the active Shem angel. State your need honestly, connecting it to what you intend to do with what is given. Jupiter grants when the request is rooted in genuine purpose, not mere acquisition. Close with a feast — eat something good in gratitude for what is already given before asking for more. If invoking Goetic spirits of wealth, do so under the Shem angel’s authority and be extremely specific: Bune responds to clear terms, Purson to genuine inquiry.", "shemNms": ["Ieiael", "Menadel", "Veuliah", "Poiel", "Anauel", "Damabiah"], "goetNms": ["Barbatos", "Purson", "Bune", "Orobas", "Belial", "Seere"], "olNm": "Bethor"}, "protection": {"desc": "Saturn and Mars operations for warding, banishing, and the destruction of hostile forces. Rooted in Geburah — the divine severity that cuts away what is false or harmful. Protection working invokes the righteous fire of God’s justice: not hatred of enemies but the establishment of inviolable boundaries between the operator and those forces working against divine order.", "guide": "Face South (Mars) or North (Saturn) at the appropriate hour, Moon waning in Scorpio, Capricorn, or Aries. For Mars protection: red candle, iron nail, dragon’s blood, bloodstone. Stand during the working. State the threat clearly and directly — Mars respects precision. For Saturn protection: black candle, obsidian, myrrh. Work at night in darkness. Fast beforehand. The protective formula is three-part: (1) invoke the Shem angel to establish divine authority, (2) name the hostile force or condition you are banishing, (3) command its cessation in the name of God and the active Shem angel. Do not ask — declare. Protection working operates from authority, not supplication. The Goetic spirits of protection (Sabnock, Andromalius) work best when the Shem correspondent is firmly established first. Close by sealing the working: extinguish the candle with fingers, not breath.", "shemNms": ["Sitael", "Chahuiah", "Seheiah", "Iehuiah", "Ielahiah", "Haiaiel"], "goetNms": ["Sabnock", "Andromalius", "Glasya-Labolas", "Foras"], "olNm": "Phalegh"}, "knowledge": {"desc": "Mercury and Moon operations for illumination, learning, and the revelation of hidden things. Rooted in Hod — the sphere of divine intellect, language, and sacred symbol. Knowledge working does not acquire information so much as it removes the veils that prevent the mind from seeing what is already present. The tradition holds that all knowledge is latent in the soul; these operations draw it to the surface.", "guide": "Face East at the Mercury hour on Wednesday, Moon in Gemini, Virgo, Aquarius, or Pisces. Altar: agate or fluorite, orange or violet candle, mastic or lavender, quill and fresh ink, open book. Write your question on paper rather than speaking it — Mercury works through written word. Recite the Psalm of the active Shem angel three times, then sit in silence for at least five minutes before any further action. The answer often comes in this silence, not in the invocation. If seeking the Goetic spirits of knowledge (Paimon, Vassago, Gaap), approach with genuine intellectual humility: these spirits do not respond to demand but to sincere inquiry. Paimon requires formal respect; approach him seated, not standing, and offer incense before speaking. Hold agate while working. Close by writing down everything received immediately — Mercury’s revelations fade quickly.", "shemNms": ["Vehuiah", "Mahasiah", "Hariel", "Nithaiah", "Aniel", "Ariel", "Nanael", "Iah-hel"], "goetNms": ["Vassago", "Paimon", "Buer", "Gaap", "Astaroth", "Orobas"], "olNm": "Ophiel"}, "healing": {"desc": "Sun and Jupiter operations for the restoration of health, wholeness, and right function. Rooted in Tiphareth — the solar sphere of beauty and divine healing at the centre of the Tree. Healing working aligns the patient with the original divine pattern from which illness is a deviation. It does not override natural medicine but operates at the level of cause while medicine operates at the level of effect.", "guide": "Face East at the Sun hour, Moon waxing in Cancer, Virgo, or Pisces. For the healing of another: work with their full name written on paper beneath the candle. Altar: gold or yellow candle, frankincense, amber or citrine, Bay laurel or calendula. Begin with Psalm 91 or 103 aloud regardless of which specific Psalm the Shem angel carries — these are the great healing psalms of the tradition. Then recite the Shem angel’s specific Psalm. Vibrate the divine name YHVH three times slowly — this is the Tiphareth divine name and the heart of all healing work. If invoking Marbas (Goetic spirit of disease and cure), approach through his Shem correspondent first. Marbas is unusual among the Goetia in that he both causes and cures disease — approach him only for genuine healing intent, never to cause illness. Close by anointing your forehead or the written name with olive oil consecrated to the Sun.", "shemNms": ["Lelahel", "Aladiah", "Melahel", "Omael", "Rehael", "Hahasiah", "Habuhiah"], "goetNms": ["Marbas", "Buer", "Haagenti", "Vapula"], "olNm": "Och"}, "destruction": {"desc": "Saturn and Mars operations for the removal of hostile forces, the breaking of harmful patterns, and the defeat of enemies of right order. This category is not vengeance but the exercise of divine severity: the same principle through which the surgeon removes disease, the gardener cuts dead wood, and the prophet condemns injustice. Work only against that which genuinely works against divine order.", "guide": "Face South at the Mars hour, Moon waning in Scorpio, Aries, or Capricorn. Altar: red or black candle, iron, dragon’s blood, sulfur. Stand. Fast for at least half a day before working. State the specific hostile force or pattern clearly and without emotion — hatred weakens the working by making it personal rather than principled. The Shem angels of this category (Imamiah, Ielahiah) work through divine authority: invoke them to establish that what you are destroying is genuinely contrary to divine order and not merely contrary to your preferences. The distinction matters. Goetic spirits of destruction (Haures, Andras, Aim) operate through force and require the Shem angel’s presence as a constraint — without it, these spirits tend to exceed their commission. Andras in particular is dangerous without proper containment. Close by washing your hands with cold water and salt. Do not carry the working in your mind afterward.", "shemNms": ["Imamiah", "Ielahiah", "Mitzrael", "Haiaiel"], "goetNms": ["Aim", "Haures", "Andras", "Focalor", "Raum"], "olNm": "Phalegh"}, "spirit": {"desc": "Saturn and Moon operations for communication with spirits, preparation of the ritual space, and the opening of the subtle senses. These operations establish the conditions for all other workings rather than seeking a specific outcome. Rooted in Yesod — the astral foundation — and in Hod as the sphere of magical operation. Spirit work is preparation as much as petition.", "guide": "Face West (Moon) or North (Saturn) at the appropriate hour, Moon in Scorpio, Pisces, Cancer, or Aquarius. No specific material requirements — spirit work operates through attention, not props. Begin with complete silence for ten minutes. This is not meditation but active listening: the clearing of internal noise so that subtler signals can be heard. Recite Psalm 91 for protection, then the active Shem angel’s Psalm as an opening. The Shem angel Haamiah specifically governs ritual preparation and the proper approach to spirits — invoke her when opening any working space. Mumiah (Name 72) governs the completion of all operations and should be invoked at the close of every working regardless of category. The Goetic spirits of this category (Bael, Stolas, Valac) are spirits of knowledge and revelation rather than force. Approach them with prepared questions, not vague curiosity.", "shemNms": ["Nithaiah", "Haamiah", "Hahahel", "Manakel", "Mumiah", "Ariel"], "goetNms": ["Bael", "Stolas", "Bifrons", "Valac"], "olNm": "Aratron"}, "necromancy": {"desc": "Saturn operations for communion with the dead, consultation of ancestral wisdom, and the resolution of unfinished business with the departed. This is the most demanding and solemnly regulated category in the tradition. It is not communication with demons pretending to be the dead but the genuine address of those who have passed through the veil. Approach with grief and love, not curiosity.", "guide": "Work only at Saturn hours, Saturday night ideally, Moon waning in Scorpio or Pisces. Fast completely for the full day before. Altar: black candle, photograph or object of the departed if possible, myrrh, graveyard soil, water in a black bowl. Do not stand — sit or kneel. This is supplication, not command. Begin with Psalm 116 in its entirety: it is the Psalm of those who have been near death and of gratitude for passage. Speak the departed’s full name three times clearly. State that you come in peace and in the name of the God who holds all souls. Ask only one question per working — clarity of purpose is essential. The Shem angel Manakel (Name 66) governs knowledge of good and evil and night visions; he is the appropriate angelic governor for this work. Murmur (#54) among the Goetic spirits is specifically attributed to necromantic operation but should be approached with extreme caution and full Shem consecration. Close by extinguishing the candle and pouring the water onto the earth as an offering. Wait three days before any further working.", "shemNms": ["Hahaiah", "Nithaiah", "Manakel", "Mumiah"], "goetNms": ["Murmur", "Bifrons", "Glasya-Labolas"], "olNm": "Aratron"}};

function findEl(cat,lat,now){const r=[];for(let d=0;d<7;d++){const dt=new Date(now.getTime()+d*864e5),{hours}=pHours(dt,lat),ms_=mSign(dt),mp_=mPhase(dt),mn_=gMn(ms_.lon),wx=mp_.wax;for(const h of hours){if(!cat.pl.includes(h.ruler))continue;let sc=40;const re=[h.ruler+" hr"];if(cat.ms.includes(ms_.sign)){sc+=25;re.push("☽ "+ms_.sign)}if(cat.mn.includes(mn_.n)){sc+=20;re.push("Mansion "+mn_.n)}if(cat.wx===null||cat.wx===wx){sc+=15;re.push(wx?"Waxing":"Waning")}if(DR[dt.getDay()]===h.ruler){sc+=10;re.push("Day of "+h.ruler)}r.push({dt,h,sc,re,mp:mp_.name,ms:ms_.sign})}}return r.sort((a,b)=>b.sc-a.sc).slice(0,20)}

mystic:{name:"Julian of Norwich",path:"'All shall be well, and all shall be well, and all manner of thing shall be well.' Julian's radical theology of divine mercy is Chesed incarnate — mercy so vast it redeems even sin itself."},
litCol:"Royal blue and purple — the vestments of Advent (mercy approaching) and the blue of Marian feasts (mercy embodied). The baptismal candle is white with a blue ribbon.",
devotion:"Works of mercy — the corporal and spiritual works. Chesed operates through the hands. Feed the hungry, visit the sick, instruct the ignorant. Jupiter expands through generosity: give more than is asked. The practice of Chesed is the practice of abundance.",
prayer:"El — the simple divine Name of mercy. Psalm 103: 'Bless the LORD, O my soul, and forget not all his benefits.' Recite on Thursday at the Jupiter hour. Open your hands during recitation — the gesture of giving activates Chesed.",
vestment:"The chasuble — the outermost vestment of the celebrant, encompassing all others. Chesed covers and contains. The font's water is Chesed descending from Binah's reservoir.",
bodyChrist:"The left arm of Christ extended on the Cross — the arm of mercy reaching toward the good thief: 'Today shalt thou be with me in Paradise' (Luke 23:43). Chesed operates even in crucifixion."},
{n:5,cName:"Severity — The Confessional",trinRole:"Divine justice as it actively purifies. Geburah is not wrath but the surgical precision of a God who loves too much to leave corruption intact. The fire that refines gold.",
sacr:"Penance / Confession",gift:"Fortitude",
mystic:{name:"Catherine of Siena",path:"The Dialogue — Catherine's fierce conversations with God are pure Geburah: demanding, unflinching, willing to confront divine severity face to face and be changed by it. Her love was as severe as her prayer."},
litCol:"Crimson red — the colour of the Passion, of martyrdom, of the blood of Christ that purifies. Red vestments at Pentecost carry Geburah's fire as the Spirit's descending flame.",
devotion:"Examination of conscience — the nightly practice of reviewing the day with rigorous honesty. What did you do? What did you fail to do? Geburah requires truth. Confession is Geburah's sacramental channel: naming the corruption so it can be cut away.",
prayer:"Elohim Gibor — God of Strength. Psalm 120: 'In my distress I cried unto the LORD.' Recite on Tuesday at the Mars hour. Stand during recitation. Speak with controlled force — Geburah despises whimpering but honours honest confrontation.",
vestment:"The stole of the confessor — crossed on the chest like a sword. The red vestments of martyrs. The scourge and discipline of Lenten practice.",
bodyChrist:"The right arm of Christ on the Cross — the arm of judgment. But note: both arms are extended equally. Mercy and severity are in perfect balance on the Cross. Geburah in Christ is never cruelty; it is the love that says no."},
{n:6,cName:"Christ the Sun — Beauty Incarnate",trinRole:"The heart of the Tree: where God becomes human and human becomes divine. Tiphareth is the Incarnation itself — the point of maximum intersection between the descending divine and the ascending human. 'And the Word was made flesh.'",
sacr:"Eucharist",gift:"Knowledge",
mystic:{name:"Teresa of Ávila",path:"The Interior Castle, Seventh Mansion — Teresa's mystical marriage with Christ occurs at the centre of the soul, which IS Tiphareth. The bride (soul) and Bridegroom (Christ) become one in the heart of the Tree."},
litCol:"Gold and white — the Sun's colours. Gold vestments at Easter, Christmas, and all solar feasts. The gold of the tabernacle, the monstrance, the paten — all containers of Tiphareth's solar presence.",
devotion:"Adoration of the Blessed Sacrament — sitting in silence before the exposed Eucharist is the most direct Tipharethic practice. The golden monstrance is a sun. The Host is the solar body of Christ. Be present to the Presence.",
prayer:"YHVH — the central Name, unmodified. Psalm 19: 'The heavens declare the glory of God.' The solar Psalm. Recite at noon facing south. Let the full sunlight fall on your face. Do not look away.",
vestment:"The chasuble and stole of the celebrant at Mass — the priest stands at Tiphareth's centre, mediating between God above and the congregation in Malkuth. The surplice is the garment of light.",
bodyChrist:"The heart — pierced by the lance. From the wound came blood and water (John 19:34): the dual streams of Geburah (blood/severity) and Chesed (water/mercy) flowing from the centre. The Sacred Heart is Tiphareth."},
{n:7,cName:"Victory — The Beauty of Holiness",trinRole:"The divine creative impulse as it enters the realm of desire, love, and artistic beauty. Netzach is the Song of Songs: eros as a mode of divine revelation. Venus as the morning star — 'I am the root and the offspring of David, the bright and morning star' (Rev 22:16).",
sacr:"Confirmation",gift:"Piety",
mystic:{name:"Hildegard of Bingen",path:"Viriditas — the 'greening power' of God in nature. Hildegard's visions, music, and natural philosophy are Netzach incarnate: divine beauty expressed through created forms, especially plants, gems, and harmony."},
litCol:"Green — the colour of Ordinary Time, of growth, of viriditas. Rose vestments on Gaudete and Laetare Sundays — the rare pink of joy. The green of Netzach is not passive nature but active, creative, desiring life.",
devotion:"Sacred music — singing hymns and psalms is the Netzach practice par excellence. The voice is Venus's instrument. Hildegard composed as an act of prayer: let your singing be your prayer. Also: the cultivation of gardens. To tend a garden is to cooperate with Netzach's creative power.",
prayer:"YHVH Tzabaoth — Lord of Hosts. Psalm 45: 'My heart is inditing a good matter: I speak of the things which I have made touching the king.' The Psalm of the sacred marriage. Recite on Friday evening.",
vestment:"The surplice with lace — beauty in liturgical dress. The green chasubles of Ordinary Time. Flowers on the altar are Netzach made material. The Paschal candle crowned with flowers.",
bodyChrist:"The left hip — the generative side. Christ as Bridegroom (John 3:29), the wedding at Cana where water becomes wine. Netzach transforms the ordinary into the sacred through desire and love."},
{n:8,cName:"Splendour — The Word Spoken",trinRole:"The divine intellect as it shapes reality through language, number, and symbol. Hod is the Logos as communicator — the Word that became flesh first existed as the articulate intelligence of creation. Mercury carries the divine message.",
sacr:"Holy Orders",gift:"Understanding",
mystic:{name:"Bonaventure",path:"The Journey of the Mind into God — Bonaventure's systematic contemplation moves through the stages of Hod: from sensory knowledge, through intellectual reflection, to the divine names themselves. The mind, properly disciplined, becomes a mirror of God."},
litCol:"Orange and violet — Mercury's quicksilver shifts between the warmth of communication and the depth of contemplation. The violet of Advent and Lent has a Hod quality: the mind preparing itself through study and fasting.",
devotion:"Study of Scripture and theology — Hod's practice is disciplined intellectual work directed toward God. Read the Church Fathers. Learn the languages of Scripture. Hod is also the sphere of liturgical precision: learn the rubrics, the calendar, the proper forms. Chant the Office.",
prayer:"Elohim Tzabaoth — God of Hosts in the formative world. Psalm 29: 'The voice of the LORD is upon the waters.' Recite on Wednesday at the Mercury hour. Write the Psalm before reciting it — Mercury works through the written word.",
vestment:"The maniple — once worn on the left arm for study and work. The book of the Gospels carried in procession. The thurible swung by the deacon — Hod's Mercury carrying the fragrant message.",
bodyChrist:"The right hip — the intellectual side. Christ teaching in the Temple at twelve (Luke 2:46), Christ writing in the dust before the adulterous woman (John 8:6). Hod is the Word teaching, communicating, shaping understanding."},
{n:9,cName:"Foundation — The Hidden Marriage",trinRole:"The astral foundation through which all higher influences reach matter. Yesod is Gabriel's sphere: the announcement, the dream, the subtle influence that prepares Malkuth to receive the divine. The Spirit descending as a dove.",
sacr:"Matrimony",gift:"Fear of the Lord",
mystic:{name:"Jan van Ruusbroec",path:"The Spiritual Espousals — Ruusbroec's three stages (active, interior, superessential) map the journey through Yesod: from outward practice, through dream and vision, to the 'common life' that unites contemplation and action."},
litCol:"Silver and pale blue — the Moon's colours. The colour of the Immaculate Conception (white with blue). The silver of the aspergillum that sprinkles holy water — Yesod's lunar water reaching Malkuth.",
devotion:"Prayer before sleep and attention to dreams. Yesod operates most powerfully in the liminal state between waking and sleeping. Before sleep, place a petition under your pillow. In the morning, record what came. Also: the practice of faithful presence within marriage — Yesod's sacrament is the daily fidelity of two people. The hidden holiness of the ordinary commitment.",
prayer:"Shaddai El Chai — the Almighty Living God. Psalm 48: 'Great is the LORD, and greatly to be praised in the city of our God.' Recite before sleep on Monday. Place water and moonstone beside you. Yesod speaks through the body's quietest channels.",
vestment:"The wedding garment of Matthew 22 — the inner preparation without which no one enters the feast. The alb, the white undergarment worn beneath all other vestments, is Yesod: the hidden foundation of all liturgical dress.",
bodyChrist:"The generative organs — not shameful but foundational. Christ born of a woman (Gal 4:4). The Incarnation requires a body: Yesod is the sphere through which the Word takes flesh. The marriage at Cana sanctifies the foundational human bond."},
{n:10,cName:"The Kingdom — Mary, Church, Earth",trinRole:"Malkuth is the Bride, the Church, the Virgin, the World. In Christian Kabbalah, Malkuth is never merely 'matter' — it is the vessel of divine indwelling. Mary is Malkuth perfected: the material creation that says yes to God without reservation.",
sacr:"Anointing of the Sick",gift:null,
mystic:{name:"Hildegard & Julian together",path:"Both mystics celebrate the material world as God's body. Julian's hazelnut vision ('I saw that it was everything that was made') and Hildegard's viriditas are the two faces of Malkuth: smallness held in God's hand, and green life growing everywhere."},
litCol:"The four colours of Malkuth (citrine, olive, russet, black) correspond to the four seasons and four directions of the liturgical year. Brown and green for the earth. Black for Good Friday and All Souls. The varied colours of Ordinary Time.",
devotion:"Presence to the material world. Walk. Eat bread slowly. Touch earth. Malkuth's practice is the sacrament of the present moment — Brother Lawrence's 'Practice of the Presence of God.' Also: care for the sick and dying. Anointing of the Sick is Malkuth's sacrament because Malkuth is the body, and the body suffers, and the body is holy.",
prayer:"Adonai — the Lord. Psalm 24: 'The earth is the LORD's, and the fulness thereof.' Recite standing on bare earth if possible. Place your hands on the ground. Malkuth is not beneath you — it IS you, your body, your feet, the ground you stand on.",
vestment:"The cope — the great outer cloak worn in procession, covering everything. Malkuth encompasses all. The funeral pall that covers the coffin is white: Malkuth returns to Kether. The earth receives the body as Mary received the Word.",
bodyChrist:"The feet — nailed to the Cross, washed by Mary Magdalene (Luke 7:38), touching the earth of Palestine. Christ walked. The feet of Christ on the road to Emmaus (Luke 24:15). God touching the ground."}
];
